            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="74" cy="18" r="3.8" fill="#A01528"/>
      <circle cx="72.5" cy="16.5" r="1.1" fill="#FFE4D8" opacity="0.95"/>
    </g>
  </g>

  <!-- Text -->
  <text x="560" y="270" fill="#FFFFFF" font-family="-apple-system, 'Inter', sans-serif" font-size="84" font-weight="900" letter-spacing="-3">100M1S</text>
  <text x="560" y="345" fill="#E8C063" font-family="-apple-system, 'Inter', sans-serif" font-size="42" font-weight="700" letter-spacing="-1">Far. One Step.</text>
  <text x="560" y="395" fill="#8B95A8" font-family="-apple-system, 'Inter', sans-serif" font-size="26" font-weight="500" letter-spacing="-0.5">멀리, 한 걸음.</text>

  <!-- Bottom line -->
  <line x1="560" y1="450" x2="660" y2="450" stroke="#C49930" stroke-width="3"/>
  <text x="560" y="495" fill="#6B7A99" font-family="-apple-system, 'Inter', sans-serif" font-size="18" font-weight="500">100M1S · 100m1s.com</text>
