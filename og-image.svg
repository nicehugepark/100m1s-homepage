<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1D26"/>
      <stop offset="1" stop-color="#0D0F14"/>
    </linearGradient>
    <linearGradient id="snakegrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBE9B5"/>
      <stop offset="0.5" stop-color="#E8C063"/>
      <stop offset="1" stop-color="#C49930"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C49930" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#C49930" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgg)"/>
  <ellipse cx="320" cy="315" rx="320" ry="220" fill="url(#glow)"/>

  <!-- Logo R5 (scaled and positioned) -->
  <g transform="translate(180, 165) scale(2.5)">
    <g transform="translate(5, 3.5)">
      <path d="M73 24 Q73 12 59 12 Q32 12 32 33 Q32 53 58 57 Q88 61 67 86 Q46 105 26 95"
