name: 키움 500억+ 스크레이퍼 (15분)

on:
  schedule:
    # KST 10:00 ~ 21:45 (UTC 01:00 ~ 12:45), 평일만, 매 15분
    - cron: '*/15 1-12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kiwoom-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/kiwoom-scraper/requirements.txt

      - name: 스크레이퍼 실행
        env:
          KIWOOM_APPKEY: ${{ secrets.KIWOOM_APPKEY }}
          KIWOOM_SECRETKEY: ${{ secrets.KIWOOM_SECRETKEY }}
          KIWOOM_BASE_URL: ${{ secrets.KIWOOM_BASE_URL }}
        run: python scripts/kiwoom-scraper/main.py

      - name: 변경사항 커밋·푸시
        run: |
          git config user.name "newzy-bot"
          git config user.email "newzy-bot@100m1s.com"
          git add data/kiwoom/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "chore(kiwoom): snapshot $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main || true
            git push
          fi
