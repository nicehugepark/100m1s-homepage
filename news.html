<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News — 100M1S</title>
<meta name="description" content="100M1S 뉴지 — 시장 정보 + 종목별 호재/악재 분석. 매 시간 자동 갱신.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="News — 100M1S">
<meta property="og:description" content="시장 정보 + 종목별 호재/악재 분석. 매 시간 자동 갱신.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://100m1s.com/news.html">
<meta property="og:image" content="https://100m1s.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:image" content="https://100m1s.com/og-image.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg: #FAFBFE; --bg2: #F2F4F8; --sf: #FFFFFF; --bd: #E8ECF2;
  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;
  --ru: #A01528;
  --pos: #1A6B2D; --pos-bg: #E8F5EC;
  --neg: #B8302E; --neg-bg: #FFF0F0;
  --neu: #6B7A99; --neu-bg: #F2F4F8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; line-height: 1.55; }
a { color: inherit; text-decoration: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,251,254,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
}
.header-inner {
  max-width: 1100px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 36px; height: 36px; }
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 24px; font-size: 13px; font-weight: 600; color: var(--tx2); }
.nav-links a:hover, .nav-links a.active { color: var(--am); }

/* 모바일 햄버거 */
.menu-toggle { display: none; width: 40px; height: 40px; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0; }
.menu-toggle span { display: block; width: 22px; height: 2px; background: var(--tx); position: relative; }
.menu-toggle span::before, .menu-toggle span::after { content: ''; position: absolute; left: 0; width: 22px; height: 2px; background: var(--tx); transition: transform .2s; }
.menu-toggle span::before { top: -7px; }
.menu-toggle span::after { top: 7px; }
.menu-toggle.open span { background: transparent; }
.menu-toggle.open span::before { top: 0; transform: rotate(45deg); }
.menu-toggle.open span::after { top: 0; transform: rotate(-45deg); }
.mobile-drawer { display: none; position: fixed; top: 0; right: 0; width: 75%; max-width: 300px; height: 100vh; background: var(--sf); border-left: 1px solid var(--bd); padding: 80px 28px 24px; z-index: 200; transform: translateX(100%); transition: transform .25s ease-out; box-shadow: -8px 0 24px rgba(0,0,0,0.06); }
.mobile-drawer.open { transform: translateX(0); }
.mobile-drawer a { display: block; padding: 14px 0; font-size: 17px; font-weight: 700; color: var(--tx); border-bottom: 1px solid var(--bd); }
.mobile-drawer a.active { color: var(--am); }
.drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 150; }
.drawer-backdrop.open { display: block; }
@media (max-width: 720px) {
  .nav-links { display: none; }
  .menu-toggle { display: inline-flex; }
  .mobile-drawer { display: block; }
}

main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

.page-header { margin-bottom: 36px; }
.page-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; background: var(--am3);
  border: 1px solid rgba(196,153,48,0.25); border-radius: 999px;
  font-size: 10px; font-weight: 800; color: var(--am);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.page-title {
  font-size: clamp(32px, 5vw, 48px); font-weight: 900;
  letter-spacing: -1.5px; margin-bottom: 8px;
}
.page-title .accent { color: var(--am); }
.page-desc { font-size: 14px; color: var(--tx2); max-width: 640px; line-height: 1.7; }
.page-meta {
  margin-top: 16px; font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}

.loading { text-align: center; padding: 80px 24px; color: var(--dm); font-size: 13px; }
.error {
  background: var(--neg-bg); border-left: 3px solid var(--neg);
  padding: 16px 20px; border-radius: 6px; color: var(--neg);
  font-size: 13px; margin: 24px 0;
}

/* ───── 날짜 그룹 ───── */
.date-group { margin-bottom: 36px; }
.date-header {
  display: flex; align-items: baseline; gap: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--tx);
  margin-bottom: 18px;
}
.date-label {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.6px;
}
.date-stats {
  font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}

/* ───── 섹션 (상승/하락) ───── */
.section-block { margin-bottom: 28px; }
.section-title {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 14px;
  display: inline-block;
  padding: 4px 12px; border-radius: 6px;
}
.section-title.up { color: #C53939; background: #FFF0F0; }
.section-title.down { color: #1958C7; background: #EAF1FF; }

/* ───── 종목 리스트 (1단계 계단식) ───── */
.stocks-list {
  display: flex; flex-direction: column; gap: 8px;
}
.stock-row {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
  overflow: hidden;
}
.stock-main {
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 36px 1fr auto auto;
  gap: 14px;
  align-items: baseline;
}
.stock-rank {
  font-size: 11px; font-weight: 800; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.stock-name {
  font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
}
.stock-price {
  font-size: 12px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.stock-pct {
  font-size: 16px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  min-width: 80px; text-align: right;
}
.stock-pct.up { color: #C53939; }
.stock-pct.down { color: #1958C7; }
.stock-theme {
  padding: 0 18px 12px;
  font-size: 13px; color: var(--tx2); line-height: 1.55;
}
.stock-theme::before { content: '└ '; color: var(--dm); margin-right: 2px; }

/* ───── 종목 안 뉴스 카드 (계단식 한 단 안쪽) ───── */
.stock-news {
  background: var(--bg2);
  border-top: 1px dashed var(--bd);
  padding: 12px 18px 14px 36px;
  display: flex; flex-direction: column; gap: 8px;
}
.news-card {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 8px;
  padding: 10px 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.news-judgment {
  flex-shrink: 0;
  font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.news-judgment.호재 { background: var(--pos-bg); color: var(--pos); }
.news-judgment.악재 { background: var(--neg-bg); color: var(--neg); }
.news-judgment.중립 { background: var(--neu-bg); color: var(--neu); }
.judgment-strength {
  font-weight: 700;
  font-size: 9px;
  opacity: 0.75;
}
.news-content { flex: 1; min-width: 0; }
.news-summary { font-size: 12.5px; line-height: 1.6; color: var(--tx); margin-bottom: 4px; }
.news-reasoning {
  font-size: 11px; color: var(--tx2); font-style: italic;
  margin-top: 4px; line-height: 1.5;
}

/* ───── 빈 상태 ───── */
.empty-state {
  background: var(--bg2); border-radius: 12px;
  padding: 60px 24px; text-align: center;
  color: var(--dm); font-size: 14px;
}

/* ───── 향후 기능 안내 ───── */
.coming-soon {
  margin-top: 56px; padding: 24px;
  background: var(--am4); border: 1px dashed var(--am2);
  border-radius: 12px; text-align: center;
}
.coming-soon h3 {
  font-size: 13px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.coming-soon p {
  font-size: 12px; color: var(--tx2); line-height: 1.6;
  max-width: 520px; margin: 0 auto;
}

footer {
  background: var(--tx); color: var(--dm); text-align: center;
  padding: 32px 24px; font-size: 11px;
  margin-top: 80px;
}
footer .links { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; font-weight: 600; }
footer .links a:hover { color: var(--am2); }
footer .copyright { color: var(--dm); opacity: 0.6; }

/* ───── 키움 거래대금 500억+ 블록 ───── */
.kiwoom-block {
  margin-bottom: 24px;
  background: linear-gradient(135deg, #FFF9E8 0%, #FFFFFF 60%);
  border: 1px solid var(--am2);
  border-radius: 14px;
  padding: 18px 22px;
}
.kiwoom-header {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(196,153,48,0.25);
  padding-bottom: 10px;
}
.kiwoom-title {
  font-size: 13px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1px;
}
.kiwoom-meta {
  font-size: 10px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.kiwoom-list {
  display: grid; grid-template-columns: 1fr;
  gap: 6px;
}
.kiwoom-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
}
.kiwoom-row:hover { background: rgba(255,255,255,1); }
.kiwoom-row.matched-cafe { border-left: 2px solid var(--c3); padding-left: 8px; }
.kiwoom-rank {
  font-size: 10px; color: var(--dm); font-weight: 700;
  font-family: 'SF Mono', monospace;
}
.kiwoom-name-cell {
  display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px;
  min-width: 0;
}
.kiwoom-name {
  font-weight: 700; color: var(--tx); letter-spacing: -0.2px;
  white-space: nowrap;
}
.kiwoom-themes {
  display: flex; flex-wrap: wrap; gap: 3px;
}
.kiwoom-theme-chip {
  display: inline-block;
  font-size: 9px; font-weight: 600;
  padding: 2px 6px;
  border-radius: 8px;
  background: rgba(196,153,48,0.12);
  color: var(--am);
  border: 1px solid rgba(196,153,48,0.25);
  cursor: pointer;
  transition: background 0.15s;
}
.kiwoom-theme-chip:hover { background: rgba(196,153,48,0.25); }
.kiwoom-theme-chip.src-owner { background: rgba(196,153,48,0.3); border-color: var(--am); }
.kiwoom-theme-chip.src-llm { border-style: dashed; opacity: 0.85; }
.kiwoom-amount {
  font-size: 11px; color: var(--am); font-weight: 700;
  font-family: 'SF Mono', monospace;
}
.kiwoom-pct {
  font-size: 11px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  text-align: right; min-width: 56px;
}
.kiwoom-pct.up { color: #C53939; }
.kiwoom-pct.down { color: #1958C7; }

/* ───── 캘린더 + 콘텐츠 2컬럼 레이아웃 ───── */
.cal-layout {
  display: grid;
  grid-template-columns: 248px 1fr;
  gap: 28px;
  align-items: start;
  margin-bottom: 40px;
}
.cal-layout > .cal-side { position: sticky; top: 88px; }

.toss-cal {
  background: linear-gradient(180deg, #FFFCF3 0%, var(--sf) 70%);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 14px 12px 12px;
  box-shadow: 0 2px 12px rgba(26,29,38,0.04);
}
.toss-cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding: 0 4px;
}
.toss-cal-title {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 6px; color: var(--tx);
}
.toss-cal-nav {
  background: var(--bg2); border: none; cursor: pointer;
  width: 26px; height: 26px; border-radius: 8px;
  font-size: 13px; color: var(--tx2); font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.toss-cal-nav:hover:not(:disabled) { background: var(--am3); color: var(--am); }
.toss-cal-nav:disabled { color: var(--bd); cursor: not-allowed; background: transparent; }
.toss-cal-sub {
  font-size: 10px; color: var(--dm); font-family: 'SF Mono', monospace;
  padding: 0 4px 8px; text-align: right;
}
.toss-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 30px);
  grid-auto-rows: 30px;
  gap: 2px;
  justify-content: space-between;
  align-items: center;
}
.toss-cal-dow {
  font-size: 10px; font-weight: 700; color: var(--dm);
  text-align: center; width: 30px; height: 20px; line-height: 20px;
}
.toss-cal-dow.sun { color: #C53939; }
.toss-cal-dow.sat { color: #1958C7; }
.toss-cal-cell {
  width: 30px; height: 30px;
  box-sizing: border-box;
  border-radius: 8px;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--tx);
  background: transparent;
  border: 1px solid transparent;
  transition: background 0.12s, color 0.12s;
}
.toss-cal-cell.empty { color: var(--tx2); }
.toss-cal-cell.future { color: var(--bd); cursor: not-allowed; pointer-events: none; }
.toss-cal-cell.outside { visibility: hidden; }
.toss-cal-cell.lv1 { background: rgba(232,192,99,0.18); }
.toss-cal-cell.lv2 { background: rgba(232,192,99,0.34); }
.toss-cal-cell.lv3 { background: rgba(196,153,48,0.55); color: #3a2a05; }
.toss-cal-cell.lv4 { background: linear-gradient(135deg, #E8C063 0%, #C49930 100%); color: #fff; }
.toss-cal-cell.weekend:not(.lv3):not(.lv4) { opacity: 0.7; }
.toss-cal-cell:hover:not(.future):not(.selected) {
  background: var(--am3);
  border-color: rgba(196,153,48,0.3);
}
.toss-cal-cell.selected {
  background: var(--am) !important;
  color: #fff !important;
  border-color: var(--am);
  box-shadow: 0 2px 8px rgba(196,153,48,0.45);
}
.toss-cal-cell.today::after {
  content: ''; position: absolute;
  top: 2px; right: 2px; width: 4px; height: 4px;
  border-radius: 50%; background: #A01528;
}
.toss-cal-cell.selected.today::after { background: #fff; }
.toss-cal-dots {
  position: absolute; bottom: 3px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 2px;
}
.toss-cal-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: currentColor; opacity: 0.5;
}
.toss-cal-cell.selected .toss-cal-dot { background: #fff; opacity: 0.85; }
.toss-cal-legend {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; padding: 10px 4px 2px;
  border-top: 1px dashed var(--bd);
  font-size: 9px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.toss-cal-legend-swatch {
  width: 10px; height: 10px; border-radius: 3px;
}

/* ───── 캘린더 콘텐츠 영역 ───── */
.cal-content {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 24px 26px;
  min-height: 320px;
}
.cal-content-head {
  display: flex; align-items: baseline; gap: 14px;
  flex-wrap: wrap;
  padding-bottom: 14px; margin-bottom: 18px;
  border-bottom: 2px solid var(--tx);
}
.cal-content-date {
  font-size: 24px; font-weight: 900; letter-spacing: -0.7px;
  color: var(--tx);
}
.cal-content-meta {
  font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.cal-section { margin-bottom: 22px; }
.cal-section:last-child { margin-bottom: 0; }
.cal-section-title {
  font-size: 11px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1.1px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.cal-section-title::before {
  content: ''; display: inline-block;
  width: 4px; height: 14px; border-radius: 2px;
  background: linear-gradient(180deg, #E8C063, #C49930);
}
.cal-section-title .count {
  color: var(--dm); font-weight: 700;
  font-family: 'SF Mono', monospace;
}

.cal-narr-stack { display: flex; flex-direction: column; gap: 6px; }
.cal-narr-pill {
  display: inline-block;
  padding: 8px 14px; border-radius: 999px;
  background: var(--am4); border: 1px solid var(--am2);
  font-size: 13px; color: var(--tx); line-height: 1.5;
  width: fit-content; max-width: 100%;
}

.cal-trade-list { display: flex; flex-direction: column; gap: 6px; }
.cal-trade-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg2);
  font-size: 13px;
  transition: background 0.12s;
}
.cal-trade-row:hover { background: var(--am4); }
.cal-trade-rank {
  font-size: 10px; color: var(--dm); font-weight: 800;
  font-family: 'SF Mono', monospace;
}
.cal-trade-name-cell { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px; min-width: 0; }
.cal-trade-name { font-weight: 800; color: var(--tx); letter-spacing: -0.2px; }
.cal-trade-amount {
  font-size: 11px; color: var(--am); font-weight: 800;
  font-family: 'SF Mono', monospace;
}
.cal-trade-pct {
  font-size: 12px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  text-align: right; min-width: 56px;
}
.cal-trade-pct.up { color: #C53939; }
.cal-trade-pct.down { color: #1958C7; }
.cal-ind-chip {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  background: rgba(25,88,199,0.10); color: #1958C7;
  border: 1px solid rgba(25,88,199,0.20);
}

/* 특징주 카드 — cal-trade-row와 동일 배경·색상 통일 */
.cal-feature-list { display: flex; flex-direction: column; gap: 6px; }
.cal-feature-card {
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg2);
  transition: background 0.12s;
}
.cal-feature-card:hover { background: var(--am4); }
.cal-feature-head {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  font-size: 13px;
}
.cal-feature-name {
  font-weight: 800; color: var(--tx); letter-spacing: -0.2px;
  font-size: 14px;
}
.cal-feature-namecell { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px; min-width: 0; }
.cal-feature-pct {
  font-size: 12px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  text-align: right; min-width: 56px;
}
.cal-feature-pct.up { color: #C53939; }
.cal-feature-pct.down { color: #1958C7; }
.cal-feature-body {
  padding: 4px 12px 12px 44px;
  display: flex; flex-direction: column; gap: 6px;
  border-top: 1px dashed rgba(0,0,0,0.06);
  margin-top: 2px;
}
.cal-feature-reason {
  font-size: 12.5px; line-height: 1.55; color: var(--tx);
  white-space: pre-wrap;
}
.cal-feature-links {
  display: flex; flex-wrap: wrap; gap: 6px 8px;
  padding-top: 2px;
}
.cal-feature-link {
  font-size: 12px; color: var(--c3); text-decoration: none;

    bd.classList.toggle('open',willOpen);

<script>
let themesData = null;

async function loadThemes() {
  try {
    const res = await fetch('/data/themes/themes.json');
    if (!res.ok) throw new Error('themes.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadIndex() {
  try {
    const res = await fetch('/data/cafe/index.json');
    if (!res.ok) throw new Error('index.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadPost(postId) {
  try {
    const res = await fetch(`/data/cafe/posts/${postId}.json?t=` + Date.now());
    if (!res.ok) throw new Error(postId + ' HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadKiwoomIndex() {
  try {
    const res = await fetch('/data/kiwoom/index.json');
    if (!res.ok) throw new Error('kiwoom/index.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadInterpreted(postId) {
  try {
    const res = await fetch(`/data/interpreted/${postId}.json?t=` + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { console.warn('interpreted load fail', postId, e); return null; }
}

async function loadKiwoomDate(date) {
  try {
    const res = await fetch(`/data/kiwoom/${date}.json?t=` + Date.now());
    if (res.ok) return await res.json();
  } catch (e) { /* fall through */ }
  // 폴백: stock-*.json에서 종목 리스트 추출 (kiwoom 파일 미생성 시)
  try {
    const fb = await fetch(`/data/interpreted/stock-${date}.json?t=` + Date.now());
    if (fb.ok) {
      const d = await fb.json();
      if (d.stocks && d.stocks.length > 0) {
        return { daily_top: d.stocks.map(s => ({
          ticker: s.code, name: s.name, rank: s.rank,
          max_trade_amount: s.trade_amount, max_change_pct: s.change_pct
        })) };
      }
    }
  } catch (e) { /* ignore */ }
  return null;
}

function fmtTradeAmount(won) {
  if (won == null) return '—';
  if (won >= 1_000_000_000_000) return (won / 1_000_000_000_000).toFixed(1) + '조';
  if (won >= 100_000_000) return Math.round(won / 100_000_000).toLocaleString() + '억';
  if (won >= 10_000) return Math.round(won / 10_000).toLocaleString() + '만';
  return won.toLocaleString();
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('ko-KR');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

// 내부 에이전트 이름·고유명을 사용자 화면에서 제거 (상품 톤 유지)
function sanitize(s) {
  if (s == null) return '';
  return String(s)
    .replace(/박성진\s*매매\s*가치관(?:상)?/g, '내부 거래 기준')
    .replace(/박성진\s*(?:스타일|매매스타일)/g, '내부 거래 스타일')
    .replace(/박성진/g, '내부 기준')
    .replace(/주주\s*이견[:：]?/g, '추가 관점:')
    .replace(/주주\s*Top\s*Pick/gi, '주목 종목')
    .replace(/주주\s*검증/g, '재검증')
    .replace(/주주가\s*/g, '')
    .replace(/주주\s*/g, '')
    .replace(/뉴지\s*미처리/g, '분석 대기')
    .replace(/뉴지\s*선별/g, '선별')
    .replace(/뉴지가\s*/g, '')
    .replace(/뉴지\s*/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function deriveDate(post) {
  if (post.post_date) return post.post_date;
  if (post.fetched_at) return post.fetched_at.slice(0, 10);
  return '날짜 미상';
}

function renderNewsCard(card) {
  const j = card.judgment || '중립';
  // 강도 — % 숫자 대신 카테고리. 구버전 호환: confidence가 있으면 임계값으로 변환
  let strength = card.strength;
  if (!strength && card.confidence != null) {
    if (card.confidence >= 0.75) strength = '강';
    else if (card.confidence >= 0.5) strength = '중';
    else strength = '약';
  }
  const strengthHtml = strength ? `<span class="judgment-strength">·${strength}</span>` : '';
  return `
    <div class="news-card">
      <div class="news-judgment ${j}">${j}${strengthHtml}</div>
      <div class="news-content">
        <div class="news-summary">${escapeHtml(card.summary || '(요약 없음)')}</div>
        ${card.reasoning ? `<div class="news-reasoning">${escapeHtml(card.reasoning)}</div>` : ''}
      </div>
    </div>
  `;
}

/* ───── 토스 캘린더 로직 ───── */
let calIndex = null;           // data/calendar/index.json (없으면 null)
let calViewYear, calViewMonth; // 현재 보기 연·월 (month: 1~12)
let calSelectedDate = null;    // 'YYYY-MM-DD'
let calCategory = 'stock';     // 'stock' | 'realestate' | 'policy' (Phase 2/3 확장용)
const calDayCache = {};        // date → { kiwoom, cafePosts, narratives }

async function loadCalendarIndex() {
  try {
    const res = await fetch('/data/calendar/index.json');
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

function pad2(n) { return String(n).padStart(2, '0'); }
function ymd(y, m, d) { return `${y}-${pad2(m)}-${pad2(d)}`; }
function formatKoDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dow = ['일','월','화','수','목','금','토'][new Date(y, m - 1, d).getDay()];
  return `${m}월 ${d}일 (${dow})`;
}
function isWeekendDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dow = new Date(y, m - 1, d).getDay();
  return dow === 0 || dow === 6;
}

function calActivityLevel(date) {
  if (!calIndex || !calIndex.days) return 0;
  const entry = calIndex.days[date];
  if (!entry) return 0;
  // stock_count 없으면 구 스키마 — 표시 가능 데이터 없음
  const stocks = entry.stock_count ?? 0;
  if (stocks < 1) return 0;
  const news = entry.news_count ?? 0;
  if (news < 1) return 0;
  if (news >= 20) return 4;
  if (news >= 10) return 3;
  if (news >= 3) return 2;
  return 1;
}

function renderCalendar() {
  const grid = document.getElementById('toss-cal-grid');
  const ymEl = document.getElementById('toss-cal-ym');
  const subEl = document.getElementById('toss-cal-sub');
  const prevBtn = document.getElementById('toss-cal-prev');
  const nextBtn = document.getElementById('toss-cal-next');

  ymEl.textContent = `${calViewYear}년 ${calViewMonth}월`;

  const today = new Date();
  const todayY = today.getFullYear();
  const todayM = today.getMonth() + 1;
  const todayD = today.getDate();
  const todayStr = ymd(todayY, todayM, todayD);

  // 서브 텍스트 (해당 월 집계)
  subEl.textContent = '';

  // 네비게이션 제한
  nextBtn.disabled = (calViewYear > todayY) || (calViewYear === todayY && calViewMonth >= todayM);

  // 그리드 렌더
  const firstDow = new Date(calViewYear, calViewMonth - 1, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const dows = ['일','월','화','수','목','금','토'];
  let html = '';
  dows.forEach((d, i) => {
    const cls = i === 0 ? 'sun' : (i === 6 ? 'sat' : '');
    html += `<div class="toss-cal-dow ${cls}">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="toss-cal-cell outside"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const date = ymd(calViewYear, calViewMonth, d);
    const isFuture = (calViewYear > todayY) ||
                     (calViewYear === todayY && calViewMonth > todayM) ||
                     (calViewYear === todayY && calViewMonth === todayM && d > todayD);
    const lv = isFuture ? 0 : calActivityLevel(date);
    const dow = new Date(calViewYear, calViewMonth - 1, d).getDay();
    const isWeekend = (dow === 0 || dow === 6);
    const isToday = (date === todayStr);
    const classes = ['toss-cal-cell'];
    if (isFuture) classes.push('future');
    else if (lv === 0) classes.push('empty');
    else classes.push('lv' + lv);
    if (isWeekend) classes.push('weekend');
    if (isToday) classes.push('today');
    if (date === calSelectedDate) classes.push('selected');
    const aria = `${date} 활성도 ${lv}/4${isToday ? ' (오늘)' : ''}`;
    html += `<div class="${classes.join(' ')}" data-date="${date}" role="button" tabindex="${isFuture ? -1 : 0}" aria-label="${aria}">${d}</div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.toss-cal-cell[data-date]').forEach(el => {
    if (el.classList.contains('future')) return;
    el.addEventListener('click', () => onCalCellClick(el.dataset.date));
  });
}

async function onCalCellClick(date, pushState) {
  calSelectedDate = date;
  // Static URL — 날짜 공유 가능
  if (pushState !== false) {
    const url = new URL(window.location);
    url.searchParams.set('date', date);
    if (calCategory !== 'stock') url.searchParams.set('cat', calCategory);
    else url.searchParams.delete('cat'); // stock은 기본값이므로 URL에 안 넣음
    history.pushState(null, '', url);
  }
  renderCalendar();
  const inner = document.getElementById('cal-content');
  inner.innerHTML = `
    <div class="cal-content-head">
      <div class="cal-content-date">${formatKoDate(date)}</div>
      <div class="cal-content-meta">불러오는 중…</div>
    </div>
    <div class="cal-empty"><div>데이터 로드 중</div></div>
  `;
  const data = await loadCalDayData(date);
  renderCalExpandContent(date, data);
}

async function loadCalDayData(date) {
  if (calDayCache[date]) return calDayCache[date];
  const [kiwoom, cafeIndex] = await Promise.all([
    loadKiwoomDate(date),
    loadIndex()
  ]);
  // 해당 날짜 소스 포스트 수집 (병렬 로드)
  let postsOfDay = [];
  if (cafeIndex && cafeIndex.posts) {
    const idsOfDay = cafeIndex.posts
      .filter(p => {
        const d = p.post_date || (p.fetched_at || '').slice(0, 10);
        return d === date;
      })
      .map(p => p.post_id)
      .slice(0, 10);
    postsOfDay = (await Promise.all(idsOfDay.map(id => loadPost(id)))).filter(Boolean);
  }
  // 내러티브 dedupe
  const narrSet = new Set();
  for (const p of postsOfDay) {
    for (const sec of (p.sections || [])) {
      for (const st of (sec.stocks || [])) {
        for (const nc of (st.news_cards || [])) {
          if (nc.summary) narrSet.add(nc.summary.trim());
        }
      }
    }
  }
  // 해석 파일 로드 (병렬)
  const interpretedList = (await Promise.all(postsOfDay.map(p => loadInterpreted(p.post_id)))).filter(Boolean);
  // 종목명 → 해석 stock 객체 병합 맵
  const interpretedByName = new Map();
  let macroEvents = [];
  let joojuGroupReview = null;
  for (const interp of interpretedList) {
    for (const st of (interp.stocks || [])) {
      if (st.name && !interpretedByName.has(st.name)) interpretedByName.set(st.name, st);
    }
    if (interp.macro_events) macroEvents = macroEvents.concat(interp.macro_events);
    if (interp.jooju_group_review && !joojuGroupReview) joojuGroupReview = interp.jooju_group_review;
  }
  // 일일 standalone 해석 파일 (거래대금 기반, 카페와 독립) — 없으면 skip
  try {
    const dailyRes = await fetch(`/data/interpreted/kiwoom-${date}.json?t=` + Date.now());
    if (dailyRes.ok) {
      const daily = await dailyRes.json();
      for (const st of (daily.stocks || [])) {
        if (st.name && !interpretedByName.has(st.name)) interpretedByName.set(st.name, st);
      }
      if (Array.isArray(daily.macro_events) && macroEvents.length === 0) macroEvents = daily.macro_events;
    }
  } catch (e) { /* 파일 없음 허용 */ }

  // Phase 1 뉴스 파이프라인 산출물 (stock-YYYY-MM-DD.json) — DB 종목 마스터 + 뉴지/주주 해석
  try {
    const stockRes = await fetch(`/data/interpreted/${calCategory}-${date}.json?t=` + Date.now());
    if (stockRes.ok) {
      const stockDaily = await stockRes.json();
      for (const st of (stockDaily.stocks || [])) {
        if (!st.name) continue;
        // 기존 해석이 없는 종목만 추가 (카페/kiwoom 해석 우선)
        if (!interpretedByName.has(st.name)) {
          // stock-*.json 형식 → 기존 렌더러 호환 변환
          // 가비지 뉴스 필터: VI발동, 신고가, 단순 등락률 로봇 기사 제거
          const garbageRe = /[+-]?\d[\d.]*%\s*(VI\s*발동|\d+주\s*신[고저]가|상한가|하한가)|거래량\s*(폭발|급증|돌파)/;
          const newsItems = (st.news || [])
            .filter(n => !(n.newzy_verdict || '').startsWith('반대'))
            .filter(n => !garbageRe.test(n.title || ''));
          const topNews = newsItems[0];
          const pp = st.prev_pick;
          const industryLabel = st.industry ? `업종: ${st.industry}` : '';
          const sectorLabel = st.sector ? st.sector.split(',')[0] : '';
          const causalText = topNews ? (topNews.causal_chain || topNews.title || '') : '';
          const diffParts = [
            causalText,
            !causalText && industryLabel ? industryLabel : '',
            !causalText && sectorLabel ? `주요제품: ${sectorLabel}` : '',
          ].filter(Boolean);
          // 테마 자동 생성: themes 없으면 industry/sector에서 추출
          const trimIndustry = (s) => s.replace(/\s*(제조업|업)$/, '').replace(/기타\s*/, '');
          let themes = (st.themes || []).map(t => typeof t === 'string' ? { name: t } : t);
          if (themes.length === 0 && st.industry) {
            themes.push({ name: trimIndustry(st.industry) });
            if (sectorLabel && sectorLabel !== st.industry) themes.push({ name: sectorLabel });
          }

          interpretedByName.set(st.name, {
            name: st.name,
            themes,
            causal_chain: causalText ? [causalText] : (st.causal_chain ? [st.causal_chain] : []),
            differentiator: diffParts.join(' · ') || st.causal_chain || '',
            macro_event: topNews?.macro_event || null,
            news_digest: newsItems.map(n => ({ url: n.url, inferred_title: n.title, source: n.source })),
            industry: st.industry,
            sector: st.sector,
            fallback: st.fallback,
            fallback_date: st.fallback_date,
            pick_count: st.pick_count,
            prev_pick: pp,
          });
        }
      }
      // 매크로 이벤트 보충
      if (Array.isArray(stockDaily.macro_events) && macroEvents.length === 0) {
        macroEvents = stockDaily.macro_events;
      }
    }
  } catch (e) { console.warn('stock-*.json load:', e); }

  // 전일 해석 전파 (stock-*.json try-catch 밖 — 에러 삼킴 방지)
  try {
    const prevPickDates = new Set();
    for (const [name, curr] of interpretedByName) {
      if (curr.prev_pick && curr.prev_pick.date) {
        const chain = curr.causal_chain || [];
        if (chain.length === 0) prevPickDates.add(curr.prev_pick.date);
      }
    }
    for (const prevDate of prevPickDates) {
      const prevData = await loadCalDayData(prevDate);
      if (!prevData.interpretedByName) continue;
      for (const [name, prevInterp] of prevData.interpretedByName) {
        if (!interpretedByName.has(name)) continue;
        const curr = interpretedByName.get(name);
        if ((curr.causal_chain || []).length > 0) continue;
        if ((prevInterp.causal_chain || []).length > 0) {
          const merged = Object.assign({}, prevInterp);
          if (curr.pick_count) merged.pick_count = curr.pick_count;
          if (curr.prev_pick) merged.prev_pick = curr.prev_pick;
          interpretedByName.set(name, merged);
        }
      }
    }
  } catch (e) { console.warn('prev-day propagation:', e); }
  const result = {
    kiwoom,
    cafePosts: postsOfDay,
    narratives: Array.from(narrSet),
    interpretedByName,
    macroEvents,
    joojuGroupReview
  };
  calDayCache[date] = result;
  return result;
}

function renderCalExpandContent(date, data) {
  const inner = document.getElementById('cal-content');
  const kiwoomStocks = data.kiwoom ? (data.kiwoom.daily_top || data.kiwoom.latest_stocks || []) : [];
  const hasAny = (data.narratives.length > 0) || kiwoomStocks.length > 0 || data.cafePosts.length > 0;

  if (!hasAny) {
    inner.innerHTML = `
      <div class="cal-content-head">
        <div class="cal-content-date">${formatKoDate(date)}</div>
        <div class="cal-content-meta">데이터 없음</div>
      </div>
      <div class="cal-empty">
        <div class="cal-empty-circle"></div>
        <div>${isWeekendDate(date) ? '주말 — 장 휴장' : '수집된 데이터가 없습니다'}</div>
      </div>
    `;
    return;
  }

  // 특징주 수집 (종목명 → 뉴스카드 매핑 포함)
  const cafeStockMap = new Map(); // name → { stock, newsCards[] }
  for (const p of data.cafePosts) {
    for (const sec of (p.sections || [])) {
      for (const st of (sec.stocks || [])) {
        if (!st.name) continue;
        if (!cafeStockMap.has(st.name)) {
          cafeStockMap.set(st.name, { stock: st, newsCards: [] });
        }
        const entry = cafeStockMap.get(st.name);
        for (const nc of (st.news_cards || [])) entry.newsCards.push(nc);
      }
    }
  }

  // 키움 name → {ticker, change_pct} 맵 (특징주 join용)
  const kiwoomByName = new Map();
  for (const s of kiwoomStocks) {
    if (s && s.name) kiwoomByName.set(s.name, s);
  }

  // 특징주 결정: 부각 종목 우선, 비면 거래대금 TOP fallback
  let featureSource = 'primary';
  let featureItems = []; // { name, pct, themes, newsCards, ticker, reason }
  if (cafeStockMap.size > 0) {
    for (const [name, e] of cafeStockMap.entries()) {
      const kw = kiwoomByName.get(name);
      const ticker = e.stock.ticker || kw?.ticker;
      const pct = e.stock.change_pct ?? kw?.max_change_pct ?? kw?.change_pct ?? null;
      const themes = (themesData?.stocks?.[ticker]?.themes || []).slice(0, 3);
      // 사유: theme_label 우선, 없으면 news_cards[0].theme_hint
      let reason = (e.stock.theme_label || '').trim();
      if (!reason && e.newsCards.length > 0) {
        reason = (e.newsCards[0].theme_hint || '').trim();
      }
      // URL 중복 제거
      const seenUrl = new Set();
      const links = [];
      for (const nc of e.newsCards) {
        if (!nc.url || seenUrl.has(nc.url)) continue;
        seenUrl.add(nc.url);
        links.push({ url: nc.url, source: nc.source || '' });
      }
      const interp = data.interpretedByName ? data.interpretedByName.get(name) : null;
      featureItems.push({ name, pct, themes, links, ticker, reason, interp });
    }
    // 해석 있는 것 우선 정렬
    featureItems.sort((a, b) => (b.interp ? 1 : 0) - (a.interp ? 1 : 0));
    featureItems = featureItems.slice(0, 14);
  } else if (kiwoomStocks.length > 0) {
    featureSource = 'fallback';
    featureItems = kiwoomStocks.slice(0, 6).map(s => {
      const pct = s.max_change_pct ?? s.change_pct ?? null;
      const themes = (themesData?.stocks?.[s.ticker]?.themes || []).slice(0, 3);
      return { name: s.name, pct, themes, links: [], ticker: s.ticker, reason: '' };
    });
  }

  // 오늘의 종목: 거래대금 TOP을 base로, 카페·해석 정보 join
  const interpByName = data.interpretedByName || new Map();
  const todayStocks = (kiwoomStocks || []).map((s, i) => {
    const pct = s.max_change_pct ?? s.change_pct ?? null;
    const interp = interpByName.get(s.name);
    // 테마 우선순위: interp.themes (뉴스 기반 자동 추출) > themesData 정적 > []
    let themes;
    if (interp && Array.isArray(interp.themes) && interp.themes.length > 0) {
      themes = interp.themes.slice(0, 3).map(t => typeof t === 'string' ? { name: t } : t);
    } else {
      themes = (themesData?.stocks?.[s.ticker]?.themes || []).slice(0, 2);
    }
    const cafe = cafeStockMap.get(s.name);
    const links = [];
    const seen = new Set();
    if (cafe) {
      for (const nc of (cafe.newsCards || [])) {
        if (!nc.url || seen.has(nc.url)) continue;
        seen.add(nc.url);
        links.push({ url: nc.url, source: nc.source || '' });
      }
    }
    return { rank: i + 1, name: s.name, ticker: s.ticker, pct, amount: s.max_trade_amount ?? s.trade_amount, themes, interp, links };
  });

  // 메타
  const newsTotal = todayStocks.reduce((acc, i) => acc + (i.links ? i.links.length : 0), 0);
  const interpCount = todayStocks.filter(i => i.interp).length;
  const streakCount = todayStocks.filter(i => i.interp?.prev_pick).length;
  const streakSuffix = streakCount > 0 ? ` · 연속선정 ${streakCount}종` : '';
  const metaText = todayStocks.length > 0
    ? `오늘의 종목 : ${todayStocks.length}개${streakSuffix}`
    : '—';

  // ① 내러티브
  const narrHtml = data.narratives.length > 0 ? `
    <div class="cal-section">
      <div class="cal-section-title">오늘의 내러티브 <span class="count">${data.narratives.length}</span></div>
      <div class="cal-narr-stack">
        ${data.narratives.slice(0, 8).map(n => `<span class="cal-narr-pill">${escapeHtml(n)}</span>`).join('')}
      </div>
    </div>
  ` : '';

  // 매크로 이벤트 칩 — summary가 title과 다른 것만 (키워드 단독 제외), 최대 5개
  const macroEvents = (data.macroEvents || [])
    .filter(m => m.summary && m.summary !== m.title && m.summary.length > m.title.length)
    .slice(0, 5);
  const macroHtml = macroEvents.length > 0
    ? `<div class="cal-macro-strip">${macroEvents.map(m => `<span class="cal-macro-chip" title="${escapeHtml(sanitize(m.summary || ''))}">${escapeHtml(sanitize(m.title || ''))}</span>`).join('')}</div>`
    : '';

  const renderFactors = (st) => {
    const ff = st.five_factors || {};
    const ev = st.five_factors_evidence || {};
    const labels = { freshness: '신선', durability: '지속', magnitude: '크기', spreadability: '전파', liquidity: '환급' };
    const entries = Object.entries(ff)
      .map(([k, v]) => ({ k, v, label: labels[k] || k, ev: ev[k] || '' }))
      .sort((a, b) => b.v - a.v)
      .slice(0, 3);
    return entries.map(e => {
      const filled = Math.round(e.v * 5);
      const dots = Array.from({ length: 5 }, (_, i) => `<span class="cal-dot ${i < filled ? 'on' : ''}"></span>`).join('');
      return `<span class="cal-factor" title="${escapeHtml(e.ev)}"><span class="label">${e.label}</span><span class="cal-dots">${dots}</span></span>`;
    }).join('');
  };

  const renderTodayCard = (it) => {
    const pct = it.pct;
    const dir = (pct ?? 0) >= 0 ? 'up' : 'down';
    const sign = (pct ?? 0) >= 0 ? '+' : '';
    const pctText = pct != null ? `${sign}${pct.toFixed(2)}%` : '';
    const amountText = it.amount ? fmtTradeAmount(it.amount) : '';
    const themesHtml = it.themes.slice(0, 3).map(t => `<span class="cal-ind-chip">${escapeHtml(t.name)}</span>`).join('');

    // 해석 있으면 카드 확장, 없으면 compact 한 줄
    if (it.interp) {
      const st = it.interp;
      const causal = (st.causal_chain || []).slice(0, 3);
      const styledArrow = '<span class="arrow">→</span>';
      const causalHtml = causal.length > 0
        ? `<div class="cal-causal">${causal.map((c, i) => `${escapeHtml(sanitize(c)).replace(/→/g, styledArrow)}${i < causal.length - 1 ? styledArrow : ''}`).join('')}</div>`
        : '';
      // differentiator가 causal_chain과 동일하면 중복 제거
      const causalText = (causal[0] || '').trim();
      const diffRaw = (st.differentiator || st.outlook || '').trim();
      const newzyLine = (diffRaw && diffRaw !== causalText) ? diffRaw : '';
      const newzyHtml = newzyLine ? `<div class="cal-newzy-line">${escapeHtml(sanitize(newzyLine))}</div>` : '';
      // 뉴스 제목 + 링크 (제목 표시)
      const linkSeen = new Set();
      const sourceMap = {'hankyung.com':'한경','mk.co.kr':'매경','edaily.co.kr':'이데일리','biz.chosun.com':'조선비즈','etoday.co.kr':'이투데이','news.naver.com':'네이버','n.news.naver.com':'네이버'};
      const allLinks = [...(st.news_digest || []).map(n => ({ url: n.url, title: n.inferred_title, source: n.source })), ...(it.links || []).map(l => ({ url: l.url, title: '', source: '' }))];
      const linksHtml = allLinks.length > 0 ? `<div class="cal-feature-links">${allLinks.filter(l => { if (!l.url || linkSeen.has(l.url)) return false; linkSeen.add(l.url); return true; }).map(l => {
        const host = (() => { try { return new URL(l.url).hostname.replace(/^www\./, ''); } catch (e) { return ''; } })();
        const src = l.source || sourceMap[host] || host;
        const trimTitle = l.title ? (l.title.length > 30 ? l.title.slice(0, 30) + '…' : l.title) : '';
        const label = trimTitle ? `[${src}] ${trimTitle}` : src;
        return `<a class="cal-feature-link" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(sanitize(label))}</a>`;
      }).join('')}</div>` : '';
      // 연속 선정 메타 (부수적 정보 — 뉴스 요약과 분리)
      const pp = st.prev_pick;
      const pickMeta = pp
        ? `<div class="cal-pick-meta">연속 ${st.pick_count || 2}회 선정 — 전일 순위 #${pp.rank}, ${fmtTradeAmount(pp.trade_amount)}, ${(pp.change_pct||0)>=0?'+':''}${(pp.change_pct||0).toFixed(2)}%</div>`
        : '';
      // 종목명 우측 연속 배지
      const pickBadge = pp ? `<span class="cal-streak-badge">${st.pick_count || 2}연속</span>` : '';
      // 테마 칩은 링크 아래 별도 줄
      return `
        <div class="cal-feature-card">
          <div class="cal-feature-head">
            <div class="cal-trade-rank">#${it.rank}</div>
            <div class="cal-feature-namecell">
              <span class="cal-feature-name">${escapeHtml(it.name)}</span>
              ${pickBadge}
            </div>
            <div class="cal-trade-amount">${amountText}</div>
            <div class="cal-feature-pct ${dir}">${pctText}</div>
          </div>
          <div class="cal-feature-body">
            ${newzyHtml}
            ${causalHtml}
            ${linksHtml}
            ${themesHtml ? `<div class="cal-theme-row">${themesHtml}</div>` : ''}
            ${pickMeta}
          </div>
        </div>`;
    }

    // compact row (해석 없음)
    const cafeLinks = (it.links || []).slice(0, 3).map(l => {
      const label = (() => {
        try { return new URL(l.url).hostname.replace(/^www\./, ''); } catch (e) { return '링크'; }
      })();
      return `<a class="cal-feature-link" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
    }).join('');
    const linksHtml = cafeLinks ? `<div class="cal-feature-links" style="margin-top:4px;">${cafeLinks}</div>` : '';
    // compact에도 연속 배지
    const compactPP = it.interp?.prev_pick;
    const compactBadge = compactPP ? `<span class="cal-streak-badge">${it.interp?.pick_count || 2}연속</span>` : '';
    return `
      <div class="cal-trade-row">
        <div class="cal-trade-rank">#${it.rank}</div>
        <div class="cal-trade-name-cell">
          <span class="cal-trade-name">${escapeHtml(it.name)}</span>
          ${compactBadge}
          ${linksHtml}
        </div>
        <div class="cal-trade-amount">${amountText}</div>
        <div class="cal-trade-pct ${dir}">${pctText}</div>
      </div>`;
  };

  const todayHtml = todayStocks.length > 0 ? `
    <div class="cal-section">
      <div class="cal-section-title">거래대금 TOP</div>
      ${macroHtml}
      <div class="cal-trade-list" style="margin-top:10px;">
        ${todayStocks.map(renderTodayCard).join('')}
      </div>
    </div>
  ` : `
    <div class="cal-section">
      <div class="cal-section-title">오늘의 종목</div>
      <div class="cal-empty" style="padding:24px 0;">${isWeekendDate(date) ? '주말/휴장' : '데이터 없음'}</div>
    </div>
  `;

  inner.innerHTML = `
    <div class="cal-content-head">
      <div class="cal-content-date">${formatKoDate(date)}</div>
      <div class="cal-content-meta">${metaText}</div>
    </div>
    ${narrHtml}
    ${todayHtml}
  `;
}

async function initCalendar() {
  const meta = document.getElementById('meta');
  if (meta) meta.textContent = '';
  const [calIdx, themes] = await Promise.all([loadCalendarIndex(), loadThemes()]);
  calIndex = calIdx;
  themesData = themes;
  const now = new Date();
  const todayStr = ymd(now.getFullYear(), now.getMonth() + 1, now.getDate());
  // URL ?cat= / ?date= 파라미터. cat 기본값 stock.
  const urlParams = new URLSearchParams(window.location.search);
  const urlCat = urlParams.get('cat');
  if (urlCat && ['stock', 'realestate', 'policy'].includes(urlCat)) calCategory = urlCat;
  const urlDate = urlParams.get('date');
  const hasUrlDate = urlDate && /^\d{4}-\d{2}-\d{2}$/.test(urlDate);
  let initialDate = hasUrlDate ? urlDate : todayStr;
  // URL 날짜가 없고, 오늘 데이터도 없으면 최근 수집일로 폴백
  if (!hasUrlDate && calActivityLevel(todayStr) === 0 && calIndex && calIndex.days) {
    const collectedDays = Object.keys(calIndex.days)
      .filter(d => d <= todayStr)
      .sort();
    if (collectedDays.length > 0) {
      initialDate = collectedDays[collectedDays.length - 1];
    }
  }
  const [iy, im] = initialDate.split('-').map(Number);
  calViewYear = iy;
  calViewMonth = im;
  calSelectedDate = initialDate;
  renderCalendar();
  onCalCellClick(initialDate, false); // 초기 로드 시 pushState 안 함

  // 브라우저 뒤로/앞으로 지원
  window.addEventListener('popstate', () => {
    const p = new URLSearchParams(window.location.search);
    const d = p.get('date');
    const c = p.get('cat');
    if (c && ['stock', 'realestate', 'policy'].includes(c)) calCategory = c;
    if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) onCalCellClick(d, false);
  });

  document.getElementById('toss-cal-prev').addEventListener('click', () => {
    calViewMonth--;
    if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
    renderCalendar();
  });
  document.getElementById('toss-cal-next').addEventListener('click', () => {
    const now2 = new Date();
    if (calViewYear > now2.getFullYear() ||
        (calViewYear === now2.getFullYear() && calViewMonth >= now2.getMonth() + 1)) return;
    calViewMonth++;
    if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
    renderCalendar();
  });
}

initCalendar();
