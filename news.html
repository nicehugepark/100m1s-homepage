<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News — 100M1S</title>
<meta name="description" content="100M1S 뉴지 — 시장 정보 + 종목 + 호재/악재 분석. 매 시간 자동 갱신.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="News — 100M1S">
<meta property="og:description" content="시장 정보 + 종목 + 호재/악재 분석. 매 시간 자동 갱신.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://100m1s.com/news.html">
<meta property="og:image" content="https://100m1s.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://100m1s.com/og-image.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg: #FAFBFE; --bg2: #F2F4F8; --sf: #FFFFFF; --bd: #E8ECF2;
  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;
  --ru: #A01528;
  --pos: #1A6B2D; --pos-bg: #E8F5EC;
  --neg: #B8302E; --neg-bg: #FFF0F0;
  --neu: #6B7A99; --neu-bg: #F2F4F8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; line-height: 1.55; }
a { color: inherit; text-decoration: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,251,254,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
}
.header-inner {
  max-width: 1100px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 36px; height: 36px; }
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 24px; font-size: 13px; font-weight: 600; color: var(--tx2); }
.nav-links a:hover, .nav-links a.active { color: var(--am); }

main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

.page-header { margin-bottom: 32px; }
.page-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; background: var(--am3);
  border: 1px solid rgba(196,153,48,0.25); border-radius: 999px;
  font-size: 10px; font-weight: 800; color: var(--am);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.page-title {
  font-size: clamp(32px, 5vw, 48px); font-weight: 900;
  letter-spacing: -1.5px; margin-bottom: 8px;
}
.page-title .accent { color: var(--am); }
.page-desc { font-size: 14px; color: var(--tx2); max-width: 640px; line-height: 1.7; }
.page-meta {
  margin-top: 16px; font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}

.loading { text-align: center; padding: 80px 24px; color: var(--dm); font-size: 13px; }
.error {
  background: var(--neg-bg); border-left: 3px solid var(--neg);
  padding: 16px 20px; border-radius: 6px; color: var(--neg);
  font-size: 13px; margin: 24px 0;
}
.empty {
  background: var(--bg2); border-radius: 12px;
  padding: 60px 24px; text-align: center;
  color: var(--dm); font-size: 14px;
}

.posts-list { display: flex; flex-direction: column; gap: 20px; }

.post-card {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 16px;
  overflow: hidden;
}
.post-header {
  padding: 20px 24px; border-bottom: 1px solid var(--bd);
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.post-meta { font-size: 11px; color: var(--dm); font-family: 'SF Mono', monospace; }
.post-link {
  font-size: 11px; font-weight: 700;
  color: var(--am); padding: 5px 12px;
  background: var(--am3); border-radius: 6px;
}
.post-link:hover { background: var(--am); color: white; }

.section-block { padding: 16px 24px; border-bottom: 1px solid var(--bd); }
.section-block:last-child { border-bottom: 0; }
.section-title {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 12px; color: var(--am);
}
.section-title.up { color: #C53939; }
.section-title.down { color: #1958C7; }

.stocks-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.stock-card {
  background: var(--bg); border: 1px solid var(--bd); border-radius: 10px;
  padding: 14px 16px;
}
.stock-row1 { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.stock-rank { font-size: 10px; font-weight: 800; color: var(--dm); min-width: 18px; }
.stock-name { font-size: 15px; font-weight: 800; flex: 1; letter-spacing: -0.3px; }
.stock-pct { font-size: 14px; font-weight: 800; }
.stock-pct.up { color: #C53939; }
.stock-pct.down { color: #1958C7; }
.stock-row2 { font-size: 11px; color: var(--dm); margin-bottom: 6px; }
.stock-theme {
  font-size: 12px; color: var(--tx2); line-height: 1.5;
  background: var(--am4); padding: 6px 10px; border-radius: 6px;
  border-left: 2px solid var(--am2);
}
.stock-strength {
  font-size: 10px; color: var(--am); font-weight: 700;
  margin-top: 6px;
}

.news-cards-block {
  background: var(--bg2); padding: 20px 24px; border-top: 1px solid var(--bd);
}
.news-cards-title {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 14px; color: var(--tx2);
}
.news-cards { display: flex; flex-direction: column; gap: 10px; }
.news-card {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 10px;
  padding: 14px 16px; display: flex; gap: 14px;
}
.news-judgment {
  flex-shrink: 0; align-self: flex-start;
  font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.news-judgment.호재 { background: var(--pos-bg); color: var(--pos); }
.news-judgment.악재 { background: var(--neg-bg); color: var(--neg); }
.news-judgment.중립 { background: var(--neu-bg); color: var(--neu); }
.news-content { flex: 1; min-width: 0; }
.news-summary { font-size: 13px; line-height: 1.6; color: var(--tx); margin-bottom: 6px; }
.news-meta {
  font-size: 11px; color: var(--dm); font-family: 'SF Mono', monospace;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.news-meta a { color: var(--am); }
.news-meta a:hover { text-decoration: underline; }
.news-reasoning { font-size: 11px; color: var(--tx2); font-style: italic; margin-top: 4px; }

footer {
  background: var(--tx); color: var(--dm); text-align: center;
  padding: 32px 24px; font-size: 11px;
  margin-top: 80px;
}
footer .links { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; font-weight: 600; }
footer .links a:hover { color: var(--am2); }
footer .copyright { color: var(--dm); opacity: 0.6; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FBE9B5"/>
              <stop offset="0.5" stop-color="#E8C063"/>
              <stop offset="1" stop-color="#C49930"/>
            </linearGradient>
          </defs>
          <g transform="translate(5, 3.5)">
            <path d="M73 24 Q73 12 59 12 Q32 12 32 33 Q32 53 58 57 Q88 61 67 86 Q46 105 26 95" stroke="url(#hg)" stroke-width="15" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="74" cy="18" r="3.8" fill="#A01528"/>
            <circle cx="72.5" cy="16.5" r="1.1" fill="#FFE4D8" opacity="0.85"/>
          </g>
        </svg>
      </div>
      <div class="brand-name">100M1S</div>
    </a>
    <nav class="nav-links">
      <a href="/#about">About</a>
      <a href="/#products">Products</a>
      <a href="/news.html" class="active">News</a>
      <a href="/#contact">Contact</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-eyebrow">Newzy · 뉴지</div>
    <h1 class="page-title">시장은 <span class="accent">매 시간</span> 새로 쓰인다</h1>
    <p class="page-desc">
      뉴지가 매 시간 시장 게시판에서 신규 정리글을 수집하고, 종목·테마·뉴스를 추출한 뒤
      주주가 호재/악재를 판단합니다. 박성진 대표가 향후 피드백으로 판단력을 보정합니다.
    </p>
    <div class="page-meta" id="meta">로딩 중…</div>
  </div>

  <div id="content">
    <div class="loading">📡 데이터 불러오는 중…</div>
  </div>
</main>

<footer>
  <div class="links">
    <a href="/">Home</a>
    <a href="/news.html">News</a>
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
  </div>
  <div class="copyright">© 2026 100M1S · Far. One Step.</div>
</footer>

<script>
async function loadIndex() {
  try {
    const res = await fetch('/data/cafe/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('index.json HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function loadPost(postId) {
  try {
    const res = await fetch(`/data/cafe/posts/${postId}.json?t=` + Date.now());
    if (!res.ok) throw new Error(postId + ' HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    return null;
  }
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('ko-KR');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function renderStockCard(stock) {
  const dir = stock.change_pct >= 0 ? 'up' : 'down';
  const sign = stock.change_pct >= 0 ? '+' : '';
  return `
    <div class="stock-card">
      <div class="stock-row1">
        <div class="stock-rank">#${stock.rank ?? '?'}</div>
        <div class="stock-name">${escapeHtml(stock.name)}</div>
        <div class="stock-pct ${dir}">${sign}${stock.change_pct?.toFixed(2) ?? '?'}%</div>
      </div>
      <div class="stock-row2">${fmtNum(stock.price_won)}원${stock.ticker ? ' · ' + escapeHtml(stock.ticker) : ''}</div>
      ${stock.theme_label ? `<div class="stock-theme">${escapeHtml(stock.theme_label)}</div>` : ''}
      ${stock.strength_score != null ? `<div class="stock-strength">세기 ${stock.strength_score}</div>` : ''}
    </div>
  `;
}

function renderNewsCard(card) {
  const j = card.judgment || '중립';
  const conf = card.confidence != null ? Math.round(card.confidence * 100) + '%' : '—';
  return `
    <div class="news-card">
      <div class="news-judgment ${j}">${j}</div>
      <div class="news-content">
        <div class="news-summary">${escapeHtml(card.summary || '(요약 없음)')}</div>
        <div class="news-meta">
          <span>신뢰도 ${conf}</span>
          <span>${escapeHtml(card.source || '')}</span>
          <a href="${escapeHtml(card.url)}" target="_blank" rel="noopener">원문 →</a>
        </div>
        ${card.reasoning ? `<div class="news-reasoning">${escapeHtml(card.reasoning)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderPost(post) {
  const sectionsHtml = (post.sections || []).map(sec => {
    const cls = sec.type === '상승' ? 'up' : (sec.type === '하락' ? 'down' : '');
    const stocksHtml = (sec.stocks || []).map(renderStockCard).join('');
    return `
      <div class="section-block">
        <div class="section-title ${cls}">[${sec.type}] · ${sec.stocks?.length || 0}종목</div>
        <div class="stocks-grid">${stocksHtml}</div>
      </div>
    `;
  }).join('');

  const newsHtml = (post.news_cards || []).length > 0 ? `
    <div class="news-cards-block">
      <div class="news-cards-title">📰 뉴스 카드 · ${post.news_cards.length}건 (주주 판단)</div>
      <div class="news-cards">${post.news_cards.map(renderNewsCard).join('')}</div>
    </div>
  ` : '';

  return `
    <article class="post-card">
      <div class="post-header">
        <div>
          <div class="post-meta">post ${escapeHtml(post.post_id)} · ${escapeHtml(post.fetched_at || '')} · ${post.stock_count || 0}종목</div>
        </div>
        <a href="${escapeHtml(post.post_url)}" target="_blank" rel="noopener" class="post-link">원문 카페 →</a>
      </div>
      ${sectionsHtml}
      ${newsHtml}
    </article>
  `;
}

async function init() {
  const meta = document.getElementById('meta');
  const content = document.getElementById('content');

  const index = await loadIndex();
  if (!index) {
    content.innerHTML = '<div class="error">⚠️ 인덱스를 불러오지 못했습니다. 스크레이퍼가 아직 첫 실행되지 않았을 수 있습니다.</div>';
    meta.textContent = '— 데이터 없음';
    return;
  }

  meta.textContent = `최종 갱신: ${index.updated_at || '—'} · ${index.posts.length}건`;

  // 인덱스에 글이 없으면 sample 시도
  let postIds = (index.posts || []).map(p => p.post_id);
  if (postIds.length === 0) {
    postIds = ['sample'];
  }

  const posts = [];
  for (const id of postIds.slice(0, 20)) {
    const p = await loadPost(id);
    if (p) posts.push(p);
  }

  if (posts.length === 0) {
    content.innerHTML = '<div class="empty">아직 수집된 글이 없습니다.<br>스크레이퍼가 매 시간 자동으로 갱신합니다.</div>';
    return;
  }

  content.innerHTML = `<div class="posts-list">${posts.map(renderPost).join('')}</div>`;
}

init();
</script>

</body>
</html>
