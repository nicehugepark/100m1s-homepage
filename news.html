  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }

}

.nav-links a:hover, .nav-links a.active { color: var(--am); }

/* 모바일 햄버거 */
.menu-toggle { display: none; width: 40px; height: 40px; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0; }
.menu-toggle span { display: block; width: 22px; height: 2px; background: var(--tx); position: relative; }
.menu-toggle span::before, .menu-toggle span::after { content: ''; position: absolute; left: 0; width: 22px; height: 2px; background: var(--tx); transition: transform .2s; }
.menu-toggle span::before { top: -7px; }
.menu-toggle span::after { top: 7px; }
.menu-toggle.open span { background: transparent; }
.menu-toggle.open span::before { top: 0; transform: rotate(45deg); }
.menu-toggle.open span::after { top: 0; transform: rotate(-45deg); }
.mobile-drawer { display: none; position: fixed; top: 0; right: 0; width: 75%; max-width: 300px; height: 100vh; background: var(--sf); border-left: 1px solid var(--bd); padding: 80px 28px 24px; z-index: 200; transform: translateX(100%); transition: transform .25s ease-out; box-shadow: -8px 0 24px rgba(0,0,0,0.06); }
.mobile-drawer.open { transform: translateX(0); }
.mobile-drawer a { display: block; padding: 14px 0; font-size: 17px; font-weight: 700; color: var(--tx); border-bottom: 1px solid var(--bd); }
.mobile-drawer a.active { color: var(--am); }
.drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 150; }
.drawer-backdrop.open { display: block; }
@media (max-width: 720px) {
  .nav-links { display: none; }
  .menu-toggle { display: inline-flex; }
  .mobile-drawer { display: block; }
}

main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

<script>
(function(){
  var btn=document.getElementById('menu-toggle');
  var drw=document.getElementById('mobile-drawer');
  var bd=document.getElementById('drawer-backdrop');
  if(!btn||!drw||!bd)return;
  function toggle(open){
    var willOpen=(typeof open==='boolean')?open:!drw.classList.contains('open');
    drw.classList.toggle('open',willOpen);
    bd.classList.toggle('open',willOpen);
    btn.classList.toggle('open',willOpen);
    btn.setAttribute('aria-expanded',willOpen);
  }
  btn.addEventListener('click',function(){toggle();});
  bd.addEventListener('click',function(){toggle(false);});
  drw.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){toggle(false);});});
})();
</script>

<script>
/* /news Phase 1 — data/interpreted/stock-YYYY-MM-DD.json 로더 */
(function(){
  const PAGE_SIZE = 20;
  const FALLBACK_MAX_DAYS = 7;

  const listEl = document.getElementById('stock-list');
  const skelEl = document.getElementById('list-skeleton');
  const sentEl = document.getElementById('scroll-sentinel');
  const emptyEl = document.getElementById('empty-state');
  const metaEl = document.getElementById('meta');
  const macroEl = document.getElementById('macro-bar');
  const fabEl = document.getElementById('fab-top');

  const state = { stocks: [], rendered: 0, io: null, dataDate: null, requestedDate: null };

  function ymd(d){ return d.toISOString().slice(0,10); }
  function fmtAmt(n){
    if (n == null) return '—';
    if (n >= 1e12) return (n/1e12).toFixed(2) + '조';
    if (n >= 1e8) return (n/1e8).toFixed(0) + '억';
    if (n >= 1e4) return (n/1e4).toFixed(0) + '만';
    return String(n);
  }
  function fmtPct(n){ if (n == null) return '—'; return (n>=0?'+':'') + n.toFixed(2) + '%'; }
  function fmtMMDD(iso){
    if (!iso) return '';
    const m = String(iso).slice(5,10);
    return m.replace('-', '-');
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  async function tryFetch(dateStr){
    try {
      const res = await fetch(`data/interpreted/stock-${dateStr}.json?t=` + Date.now());
      if (!res.ok) return null;
      return await res.json();
    } catch (_) { return null; }
  }

  async function loadData(){
    const now = new Date();
    state.requestedDate = ymd(now);
    for (let i = 0; i <= FALLBACK_MAX_DAYS; i++){
      const d = new Date(now.getTime() - i*86400000);
      const ds = ymd(d);
      const json = await tryFetch(ds);
      if (json && Array.isArray(json.stocks) && json.stocks.length){
        state.dataDate = json.date || ds;
        state.stocks = json.stocks.slice().sort((a,b)=>(a.rank||999)-(b.rank||999));
        return true;
      }
    }
    return false;
  }

  function filterVisibleNews(news){
    return (news||[]).filter(n => {
      const v = (n && n.newzy_verdict) || '';
      return !/^\s*반대/.test(v); // FLR-20260409-TEC-001
    });
  }

  function renderMacros(){
    const seen = new Set();
    const chips = [];
    for (const s of state.stocks){
      const visible = filterVisibleNews(s.news);
      if (!visible.length) continue;
      const ev = visible[0].macro_event;
      if (ev && !seen.has(ev)){ seen.add(ev); chips.push(ev); }
    }
    if (!chips.length){ macroEl.hidden = true; return; }
    macroEl.hidden = false;
    macroEl.innerHTML = chips.slice(0,12).map(c => `<span class="macro-chip">${esc(c)}</span>`).join('');
  }

  function rowHtml(s){
    const rank = s.rank || 0;
    const visibleNews = filterVisibleNews(s.news);
    const hasNews = visibleNews.length > 0;
    const isFallback = !!s.fallback;

    const classes = ['stock-row'];
    if (rank <= 10) classes.push('accent');
    if (rank >= 31 || !hasNews) classes.push('compact');

    const pctClass = (s.change_pct||0) >= 0 ? 'up' : 'down';

    const themes = Array.isArray(s.themes) ? s.themes : [];
    const themeChips = themes.slice(0,2).map(t => `<span class="sr-theme">${esc(t)}</span>`).join('')
      + (themes.length > 2 ? `<span class="sr-theme more">+${themes.length-2}</span>` : '');

    const industryBadge = s.industry ? `<span class="sr-industry">${esc(s.industry)}</span>` : '';

    let topScore = null;
    for (const n of visibleNews){
      if (typeof n.newzy_score === 'number' && (topScore == null || n.newzy_score > topScore)) topScore = n.newzy_score;
    }
    const scoreBadge = (topScore != null) ? `<span class="sr-newzy-badge">뉴지 ${topScore.toFixed(2)}</span>` : '';

    let newsHtml = '';
    if (hasNews){
      newsHtml = `<div class="sr-news">` + visibleNews.map(n => {
        const v = String(n.newzy_verdict||'');
        const vClass = v.startsWith('동의') ? 'agree' : (v.startsWith('경계') ? 'warn' : '');
        const dateLabel = (isFallback && n.published_at) ? `<span class="sr-news-date">${esc(fmtMMDD(n.published_at))}</span>` : '';
        const causal = n.causal_chain ? `<div class="sr-news-causal">${esc(n.causal_chain)}</div>` : '';
        const verdict = v ? `<div class="sr-news-verdict ${vClass}">${esc(v)}</div>` : '';
        return `
          <div class="sr-news-item">
            <a class="sr-news-title" href="${esc(n.url||'#')}" target="_blank" rel="noopener">${esc(n.title||'(제목 없음)')}</a>
            <div class="sr-news-meta">
              ${dateLabel}
              <span>${esc(n.source||'')}</span>
              ${typeof n.newzy_score==='number' ? `<span>score ${n.newzy_score.toFixed(2)}</span>` : ''}
            </div>
            ${causal}
            ${verdict}
          </div>`;
      }).join('') + `</div>`;
    }

    return `
      <div class="${classes.join(' ')}" data-rank="${rank}">
        <div class="sr-rank">${rank || '—'}</div>
        <div class="sr-name-cell">
          <div class="sr-name">${esc(s.name||'')}${scoreBadge}</div>
          ${industryBadge}
          ${themes.length ? `<div class="sr-themes">${themeChips}</div>` : ''}
        </div>
        <div class="sr-amt">${fmtAmt(s.trade_amount)}</div>
        <div class="sr-pct ${pctClass}">${fmtPct(s.change_pct)}</div>
        ${newsHtml}
      </div>`;
  }

  function appendNextPage(){
    const next = state.stocks.slice(state.rendered, state.rendered + PAGE_SIZE);
    if (!next.length){
      if (state.io) state.io.disconnect();
      skelEl.hidden = true;
      return;
    }
    skelEl.hidden = false;
    const frag = document.createElement('div');
    frag.innerHTML = next.map(rowHtml).join('');
    while (frag.firstChild) listEl.appendChild(frag.firstChild);
    state.rendered += next.length;
    skelEl.hidden = true;
    if (state.rendered >= state.stocks.length && state.io) state.io.disconnect();
  }

  function initInfiniteScroll(){
    // IntersectionObserver 무한 스크롤
    state.io = new IntersectionObserver((entries)=>{
      for (const e of entries){
        if (e.isIntersecting) appendNextPage();
      }
    }, { root: null, rootMargin: '0px 0px 150px 0px', threshold: 0 });
    state.io.observe(sentEl);
  }

  function showEmpty(){
    listEl.innerHTML = '';
    macroEl.hidden = true;
    skelEl.hidden = true;
    emptyEl.hidden = false;
    emptyEl.innerHTML = `오늘 데이터 준비 중 · 최근 거래일 자료를 찾지 못했습니다.`;
    metaEl.textContent = '데이터 없음';
  }

  function bindFab(){
    window.addEventListener('scroll', () => {
      fabEl.hidden = window.scrollY <= 800;
    }, { passive: true });
    fabEl.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  (async function main(){
    bindFab();
    const ok = await loadData();
    if (!ok){ showEmpty(); return; }
    const isStale = state.dataDate !== state.requestedDate;
    metaEl.textContent = `데이터 ${state.dataDate}${isStale ? ' · 최근 거래일 기준' : ''} · 종목 ${state.stocks.length}`;
    renderMacros();
    initInfiniteScroll();
    appendNextPage(); // 초기 1페이지 즉시 렌더
  })();
})();
</script>

</body>
</html>
