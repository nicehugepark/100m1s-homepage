<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News — 100M1S</title>
<meta name="description" content="100M1S 뉴지 — 시장 정보 + 종목별 호재/악재 분석. 매 시간 자동 갱신.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="News — 100M1S">
<meta property="og:description" content="시장 정보 + 종목별 호재/악재 분석. 매 시간 자동 갱신.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://100m1s.com/news.html">
<meta property="og:image" content="https://100m1s.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://100m1s.com/og-image.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg: #FAFBFE; --bg2: #F2F4F8; --sf: #FFFFFF; --bd: #E8ECF2;
  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;
  --ru: #A01528;
  --pos: #1A6B2D; --pos-bg: #E8F5EC;
  --neg: #B8302E; --neg-bg: #FFF0F0;
  --neu: #6B7A99; --neu-bg: #F2F4F8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; line-height: 1.55; }
a { color: inherit; text-decoration: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,251,254,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
}
.header-inner {
  max-width: 1100px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 36px; height: 36px; }
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 24px; font-size: 13px; font-weight: 600; color: var(--tx2); }
.nav-links a:hover, .nav-links a.active { color: var(--am); }

main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

.page-header { margin-bottom: 36px; }
.page-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; background: var(--am3);
  border: 1px solid rgba(196,153,48,0.25); border-radius: 999px;
  font-size: 10px; font-weight: 800; color: var(--am);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.page-title {
  font-size: clamp(32px, 5vw, 48px); font-weight: 900;
  letter-spacing: -1.5px; margin-bottom: 8px;
}
.page-title .accent { color: var(--am); }
.page-desc { font-size: 14px; color: var(--tx2); max-width: 640px; line-height: 1.7; }
.page-meta {
  margin-top: 16px; font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}

.loading { text-align: center; padding: 80px 24px; color: var(--dm); font-size: 13px; }
.error {
  background: var(--neg-bg); border-left: 3px solid var(--neg);
  padding: 16px 20px; border-radius: 6px; color: var(--neg);
  font-size: 13px; margin: 24px 0;
}

/* ───── 날짜 그룹 ───── */
.date-group { margin-bottom: 36px; }
.date-header {
  display: flex; align-items: baseline; gap: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--tx);
  margin-bottom: 18px;
}
.date-label {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.6px;
}
.date-stats {
  font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}

/* ───── 섹션 (상승/하락) ───── */
.section-block { margin-bottom: 28px; }
.section-title {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 14px;
  display: inline-block;
  padding: 4px 12px; border-radius: 6px;
}
.section-title.up { color: #C53939; background: #FFF0F0; }
.section-title.down { color: #1958C7; background: #EAF1FF; }

/* ───── 종목 리스트 (1단계 계단식) ───── */
.stocks-list {
  display: flex; flex-direction: column; gap: 8px;
}
.stock-row {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
  overflow: hidden;
}
.stock-main {
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 36px 1fr auto auto;
  gap: 14px;
  align-items: baseline;
}
.stock-rank {
  font-size: 11px; font-weight: 800; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.stock-name {
  font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
}
.stock-price {
  font-size: 12px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.stock-pct {
  font-size: 16px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  min-width: 80px; text-align: right;
}
.stock-pct.up { color: #C53939; }
.stock-pct.down { color: #1958C7; }
.stock-theme {
  padding: 0 18px 12px;
  font-size: 13px; color: var(--tx2); line-height: 1.55;
}
.stock-theme::before { content: '└ '; color: var(--dm); margin-right: 2px; }

/* ───── 종목 안 뉴스 카드 (계단식 한 단 안쪽) ───── */
.stock-news {
  background: var(--bg2);
  border-top: 1px dashed var(--bd);
  padding: 12px 18px 14px 36px;
  display: flex; flex-direction: column; gap: 8px;
}
.news-card {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 8px;
  padding: 10px 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.news-judgment {
  flex-shrink: 0;
  font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.news-judgment.호재 { background: var(--pos-bg); color: var(--pos); }
.news-judgment.악재 { background: var(--neg-bg); color: var(--neg); }
.news-judgment.중립 { background: var(--neu-bg); color: var(--neu); }
.judgment-strength {
  font-weight: 700;
  font-size: 9px;
  opacity: 0.75;
}
.news-content { flex: 1; min-width: 0; }
.news-summary { font-size: 12.5px; line-height: 1.6; color: var(--tx); margin-bottom: 4px; }
.news-reasoning {
  font-size: 11px; color: var(--tx2); font-style: italic;
  margin-top: 4px; line-height: 1.5;
}

/* ───── 빈 상태 ───── */
.empty {
  background: var(--bg2); border-radius: 12px;
  padding: 60px 24px; text-align: center;
  color: var(--dm); font-size: 14px;
}

/* ───── 향후 기능 안내 ───── */
.coming-soon {
  margin-top: 56px; padding: 24px;
  background: var(--am4); border: 1px dashed var(--am2);
  border-radius: 12px; text-align: center;
}
.coming-soon h3 {
  font-size: 13px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.coming-soon p {
  font-size: 12px; color: var(--tx2); line-height: 1.6;
  max-width: 520px; margin: 0 auto;
}

footer {
  background: var(--tx); color: var(--dm); text-align: center;
  padding: 32px 24px; font-size: 11px;
  margin-top: 80px;
}
footer .links { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; font-weight: 600; }
footer .links a:hover { color: var(--am2); }
footer .copyright { color: var(--dm); opacity: 0.6; }

/* ───── 키움 거래대금 500억+ 블록 ───── */
.kiwoom-block {
  margin-bottom: 24px;
  background: linear-gradient(135deg, #FFF9E8 0%, #FFFFFF 60%);
  border: 1px solid var(--am2);
  border-radius: 14px;
  padding: 18px 22px;
}
.kiwoom-header {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(196,153,48,0.25);
  padding-bottom: 10px;
}
.kiwoom-title {
  font-size: 13px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1px;
}
.kiwoom-meta {
  font-size: 10px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.kiwoom-list {
  display: grid; grid-template-columns: 1fr;
  gap: 6px;
}
.kiwoom-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
}
.kiwoom-row:hover { background: rgba(255,255,255,1); }
.kiwoom-row.matched-cafe { border-left: 2px solid var(--c3); padding-left: 8px; }
.kiwoom-rank {
  font-size: 10px; color: var(--dm); font-weight: 700;
  font-family: 'SF Mono', monospace;
}
.kiwoom-name-cell {
  display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px;
  min-width: 0;
}
.kiwoom-name {
  font-weight: 700; color: var(--tx); letter-spacing: -0.2px;
  white-space: nowrap;
}
.kiwoom-themes {
  display: flex; flex-wrap: wrap; gap: 3px;
}
.kiwoom-theme-chip {
  display: inline-block;
  font-size: 9px; font-weight: 600;
  padding: 2px 6px;
  border-radius: 8px;
  background: rgba(196,153,48,0.12);
  color: var(--am);
  border: 1px solid rgba(196,153,48,0.25);
  cursor: pointer;
  transition: background 0.15s;
}
.kiwoom-theme-chip:hover { background: rgba(196,153,48,0.25); }
.kiwoom-theme-chip.src-owner { background: rgba(196,153,48,0.3); border-color: var(--am); }
.kiwoom-theme-chip.src-llm { border-style: dashed; opacity: 0.85; }
.kiwoom-amount {
  font-size: 11px; color: var(--am); font-weight: 700;
  font-family: 'SF Mono', monospace;
}
.kiwoom-pct {
  font-size: 11px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  text-align: right; min-width: 56px;
}
.kiwoom-pct.up { color: #C53939; }
.kiwoom-pct.down { color: #1958C7; }

/* ───── 캘린더 + 콘텐츠 2컬럼 레이아웃 ───── */
.cal-layout {
  display: grid;
  grid-template-columns: 296px 1fr;
  gap: 28px;
  align-items: start;
  margin-bottom: 40px;
}
.cal-layout > .cal-side { position: sticky; top: 88px; }

.toss-cal {
  background: linear-gradient(180deg, #FFFCF3 0%, var(--sf) 70%);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 16px 14px 14px;
  box-shadow: 0 2px 12px rgba(26,29,38,0.04);
}
.toss-cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding: 0 4px;
}
.toss-cal-title {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 6px; color: var(--tx);
}
.toss-cal-nav {
  background: var(--bg2); border: none; cursor: pointer;
  width: 26px; height: 26px; border-radius: 8px;
  font-size: 13px; color: var(--tx2); font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.toss-cal-nav:hover:not(:disabled) { background: var(--am3); color: var(--am); }
.toss-cal-nav:disabled { color: var(--bd); cursor: not-allowed; background: transparent; }
.toss-cal-sub {
  font-size: 10px; color: var(--dm); font-family: 'SF Mono', monospace;
  padding: 0 4px 8px; text-align: right;
}
.toss-cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
}
.toss-cal-dow {
  font-size: 11px; font-weight: 700; color: var(--dm);
  text-align: center; height: 24px; line-height: 24px;
}
.toss-cal-dow.sun { color: #C53939; }
.toss-cal-dow.sat { color: #1958C7; }
.toss-cal-cell {
  width: 100%; aspect-ratio: 1; border-radius: 9px;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--tx);
  background: transparent;
  border: 1px solid transparent;
  transition: background 0.12s, color 0.12s;
}
.toss-cal-cell.empty { color: var(--tx2); }
.toss-cal-cell.future { color: var(--bd); cursor: not-allowed; pointer-events: none; }
.toss-cal-cell.outside { visibility: hidden; }
.toss-cal-cell.lv1 { background: rgba(232,192,99,0.18); }
.toss-cal-cell.lv2 { background: rgba(232,192,99,0.34); }
.toss-cal-cell.lv3 { background: rgba(196,153,48,0.55); color: #3a2a05; }
.toss-cal-cell.lv4 { background: linear-gradient(135deg, #E8C063 0%, #C49930 100%); color: #fff; }
.toss-cal-cell.weekend:not(.lv3):not(.lv4) { opacity: 0.7; }
.toss-cal-cell:hover:not(.future):not(.selected) {
  background: var(--am3);
  border-color: rgba(196,153,48,0.3);
}
.toss-cal-cell.selected {
  background: var(--am) !important;
  color: #fff !important;
  border-color: var(--am);
  box-shadow: 0 2px 8px rgba(196,153,48,0.45);
}
.toss-cal-cell.today::after {
  content: ''; position: absolute;
  top: 3px; right: 3px; width: 5px; height: 5px;
  border-radius: 50%; background: #A01528;
}
.toss-cal-cell.selected.today::after { background: #fff; }
.toss-cal-dots {
  position: absolute; bottom: 3px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 2px;
}
.toss-cal-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: currentColor; opacity: 0.5;
}
.toss-cal-cell.selected .toss-cal-dot { background: #fff; opacity: 0.85; }
.toss-cal-legend {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; padding: 10px 4px 2px;
  border-top: 1px dashed var(--bd);
  font-size: 9px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.toss-cal-legend-swatch {
  width: 10px; height: 10px; border-radius: 3px;
}

/* ───── 캘린더 콘텐츠 영역 ───── */
.cal-content {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 24px 26px;
  min-height: 320px;
}
.cal-content-head {
  display: flex; align-items: baseline; gap: 14px;
  flex-wrap: wrap;
  padding-bottom: 14px; margin-bottom: 18px;
  border-bottom: 2px solid var(--tx);
}
.cal-content-date {
  font-size: 24px; font-weight: 900; letter-spacing: -0.7px;
  color: var(--tx);
}
.cal-content-meta {
  font-size: 11px; color: var(--dm);
  font-family: 'SF Mono', monospace;
}
.cal-section { margin-bottom: 22px; }
.cal-section:last-child { margin-bottom: 0; }
.cal-section-title {
  font-size: 11px; font-weight: 800; color: var(--am);
  text-transform: uppercase; letter-spacing: 1.1px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.cal-section-title::before {
  content: ''; display: inline-block;
  width: 4px; height: 14px; border-radius: 2px;
  background: linear-gradient(180deg, #E8C063, #C49930);
}
.cal-section-title .count {
  color: var(--dm); font-weight: 700;
  font-family: 'SF Mono', monospace;
}

.cal-narr-stack { display: flex; flex-direction: column; gap: 6px; }
.cal-narr-pill {
  display: inline-block;
  padding: 8px 14px; border-radius: 999px;
  background: var(--am4); border: 1px solid var(--am2);
  font-size: 13px; color: var(--tx); line-height: 1.5;
  width: fit-content; max-width: 100%;
}

.cal-trade-list { display: flex; flex-direction: column; gap: 6px; }
.cal-trade-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg2);
  font-size: 13px;
  transition: background 0.12s;
}
.cal-trade-row:hover { background: var(--am4); }
.cal-trade-rank {
  font-size: 10px; color: var(--dm); font-weight: 800;
  font-family: 'SF Mono', monospace;
}
.cal-trade-name-cell { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px; min-width: 0; }
.cal-trade-name { font-weight: 800; color: var(--tx); letter-spacing: -0.2px; }
.cal-trade-amount {
  font-size: 11px; color: var(--am); font-weight: 800;
  font-family: 'SF Mono', monospace;
}
.cal-trade-pct {
  font-size: 12px; font-weight: 800;
  font-family: 'SF Mono', monospace;
  text-align: right; min-width: 56px;
}
.cal-trade-pct.up { color: #C53939; }
.cal-trade-pct.down { color: #1958C7; }
.cal-ind-chip {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  background: rgba(25,88,199,0.10); color: #1958C7;
  border: 1px solid rgba(25,88,199,0.20);
}

/* 특징주 (카드 + 들여쓴 뉴스) */
.cal-feature-list { display: flex; flex-direction: column; gap: 12px; }
.cal-feature-card {
  border: 1px solid var(--bd);
  border-radius: 12px;
  overflow: hidden;
  background: var(--sf);
}
.cal-feature-head {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: linear-gradient(90deg, #FFF9E8 0%, var(--sf) 100%);
  border-bottom: 1px solid var(--bd);
}
.cal-feature-name {
  font-size: 15px; font-weight: 800; letter-spacing: -0.3px;
}
.cal-feature-pct {
  font-size: 12px; font-weight: 800;
  font-family: 'SF Mono', monospace;
}
.cal-feature-pct.up { color: #C53939; }
.cal-feature-pct.down { color: #1958C7; }
.cal-feature-source {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 999px; letter-spacing: 0.4px;
  text-transform: uppercase;
}
.cal-feature-source.cafe { background: var(--pos-bg); color: var(--pos); }
.cal-feature-source.fallback { background: var(--neu-bg); color: var(--neu); }
.cal-feature-news {
  padding: 10px 16px 14px 28px;
  background: var(--bg);
  display: flex; flex-direction: column; gap: 6px;
}
.cal-feature-news-empty {
  font-size: 11px; color: var(--dm); padding: 4px 0;
}

.cal-empty {
  text-align: center; padding: 50px 20px;
  color: var(--dm); font-size: 13px;
}
.cal-empty-circle {
  display: inline-block; width: 32px; height: 32px;
  border: 2px solid var(--dm); border-radius: 50%;
  margin-bottom: 12px; opacity: 0.4;
}

@media (max-width: 880px) {
  .cal-layout {
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .cal-layout > .cal-side { position: static; }
  .toss-cal { max-width: 360px; margin: 0 auto; }
  .cal-content { padding: 20px 18px; }
  .cal-content-date { font-size: 20px; }
}
@media (max-width: 640px) {
  .stock-main { grid-template-columns: 28px 1fr auto; }
  .stock-price { display: none; }
  .stock-news { padding: 10px 14px 12px 24px; }
  .kiwoom-row { grid-template-columns: 24px 1fr auto auto; gap: 8px; }
  .kiwoom-amount { font-size: 10px; }
  .kiwoom-pct { font-size: 10px; min-width: 48px; }
  .cal-trade-row { grid-template-columns: 24px 1fr auto auto; gap: 8px; padding: 9px 10px; }
  .cal-trade-amount { font-size: 10px; }
  .cal-trade-pct { font-size: 11px; min-width: 48px; }
  .cal-feature-news { padding-left: 18px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FBE9B5"/>
              <stop offset="0.5" stop-color="#E8C063"/>
              <stop offset="1" stop-color="#C49930"/>
            </linearGradient>
          </defs>
          <g transform="translate(5, 3.5)">

<script>
let themesData = null;

async function loadThemes() {
  try {
    const res = await fetch('/data/themes/themes.json?t=' + Date.now());
    if (!res.ok) throw new Error('themes.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadIndex() {
  try {
    const res = await fetch('/data/cafe/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('index.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadPost(postId) {
  try {
    const res = await fetch(`/data/cafe/posts/${postId}.json?t=` + Date.now());
    if (!res.ok) throw new Error(postId + ' HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadKiwoomIndex() {
  try {
    const res = await fetch('/data/kiwoom/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('kiwoom/index.json HTTP ' + res.status);
    return await res.json();
  } catch (e) { return null; }
}

async function loadKiwoomDate(date) {
  try {
    const res = await fetch(`/data/kiwoom/${date}.json?t=` + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

function fmtTradeAmount(won) {
  if (won == null) return '—';
  if (won >= 1_000_000_000_000) return (won / 1_000_000_000_000).toFixed(1) + '조';
  if (won >= 100_000_000) return Math.round(won / 100_000_000).toLocaleString() + '억';
  if (won >= 10_000) return Math.round(won / 10_000).toLocaleString() + '만';
  return won.toLocaleString();
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('ko-KR');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function deriveDate(post) {
  if (post.post_date) return post.post_date;
  if (post.fetched_at) return post.fetched_at.slice(0, 10);
  return '날짜 미상';
}

function renderNewsCard(card) {
  const j = card.judgment || '중립';
  // 강도 — % 숫자 대신 카테고리. 구버전 호환: confidence가 있으면 임계값으로 변환
  let strength = card.strength;
  if (!strength && card.confidence != null) {
    if (card.confidence >= 0.75) strength = '강';
    else if (card.confidence >= 0.5) strength = '중';
    else strength = '약';
  }
  const strengthHtml = strength ? `<span class="judgment-strength">·${strength}</span>` : '';
  return `
    <div class="news-card">
      <div class="news-judgment ${j}">${j}${strengthHtml}</div>
      <div class="news-content">
        <div class="news-summary">${escapeHtml(card.summary || '(요약 없음)')}</div>
        ${card.reasoning ? `<div class="news-reasoning">${escapeHtml(card.reasoning)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderStockRow(stock) {
  const dir = (stock.change_pct ?? 0) >= 0 ? 'up' : 'down';
  const sign = (stock.change_pct ?? 0) >= 0 ? '+' : '';
  const pctText = stock.change_pct != null ? `${sign}${stock.change_pct.toFixed(2)}%` : '—';
  const priceText = stock.price_won != null ? `${fmtNum(stock.price_won)}원` : '';
  const themeHtml = stock.theme_label ? `<div class="stock-theme">${escapeHtml(stock.theme_label)}</div>` : '';
  const newsHtml = (stock.news_cards && stock.news_cards.length > 0) ? `
    <div class="stock-news">
      ${stock.news_cards.map(renderNewsCard).join('')}
    </div>
  ` : '';
  return `
    <div class="stock-row">
      <div class="stock-main">
        <div class="stock-rank">${stock.rank ? '#' + stock.rank : ''}</div>
        <div class="stock-name">${escapeHtml(stock.name)}</div>
        <div class="stock-price">${priceText}</div>
        <div class="stock-pct ${dir}">${pctText}</div>
      </div>
      ${themeHtml}
      ${newsHtml}
    </div>
  `;
}

function renderSection(section) {
  const cls = section.type === '상승' ? 'up' : (section.type === '하락' ? 'down' : '');
  const stocksHtml = (section.stocks || []).map(renderStockRow).join('');
  return `
    <div class="section-block">
      <div class="section-title ${cls}">[${section.type}] · ${section.stocks?.length || 0}종목</div>
      <div class="stocks-list">${stocksHtml}</div>
    </div>
  `;
}

function renderKiwoomBlock(kiwoom, cafeStockNames) {
  if (!kiwoom) return '';
  const stocks = kiwoom.daily_top || kiwoom.latest_stocks || [];
  if (stocks.length === 0) return '';
  const top = stocks.slice(0, 30);
  const lastUpdate = (kiwoom.last_snapshot_at || kiwoom.fetched_at || '').slice(11, 16);
  const snapCount = kiwoom.snapshot_count || 0;
  const rowsHtml = top.map((s, i) => {
    // change_pct: max_change_pct (daily_top) 또는 change_pct (latest)
    const pct = s.max_change_pct ?? s.change_pct ?? 0;
    const dir = pct >= 0 ? 'up' : 'down';
    const sign = pct >= 0 ? '+' : '';
    // 카페에 같은 종목 등장 시 표시
    const matchedClass = cafeStockNames.has(s.name) ? ' matched-cafe' : '';
    const themes = (themesData?.stocks?.[s.ticker]?.themes || []).slice(0, 5);
    const themesHtml = themes.length > 0
      ? `<span class="kiwoom-themes">${themes.map(t => {
          const srcClass = t.source === 'owner_input' ? ' src-owner'
                         : t.source === 'llm_inference' ? ' src-llm' : '';
          return `<span class="kiwoom-theme-chip${srcClass}" data-theme="${escapeHtml(t.name)}">${escapeHtml(t.name)}</span>`;
        }).join('')}</span>`
      : '';
    return `
      <div class="kiwoom-row${matchedClass}">
        <div class="kiwoom-rank">#${i + 1}</div>
        <div class="kiwoom-name-cell">
          <span class="kiwoom-name">${escapeHtml(s.name)}</span>
          ${themesHtml}
        </div>
        <div class="kiwoom-pct ${dir}">${sign}${pct.toFixed(2)}%</div>
        <div class="kiwoom-amount">${fmtTradeAmount(s.max_trade_amount ?? s.trade_amount)}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="kiwoom-block">
      <div class="kiwoom-header">
        <div class="kiwoom-title">📊 거래대금 500억+ Top 30</div>
        <div class="kiwoom-meta">${lastUpdate || '—'} 갱신 · ${snapCount}회 · ${top.length}종목</div>
      </div>
      <div class="kiwoom-list">${rowsHtml}</div>
    </div>
  `;
}

function collectCafeStockNames(posts) {
  const names = new Set();
  for (const p of posts) {
    for (const sec of (p.sections || [])) {
      for (const st of (sec.stocks || [])) {
        if (st.name) names.add(st.name);
      }
    }
  }
  return names;
}

function renderDateGroup(date, posts, kiwoom) {
  const totalStocks = posts.reduce((s, p) => s + (p.stock_count || 0), 0);
  const totalNews = posts.reduce((s, p) => {
    return s + (p.sections || []).reduce((s2, sec) => {
      return s2 + (sec.stocks || []).reduce((s3, st) => s3 + (st.news_cards?.length || 0), 0);
    }, 0);
  }, 0);
  const cafeStockNames = collectCafeStockNames(posts);
  const kiwoomCount = kiwoom ? (kiwoom.daily_top?.length || kiwoom.latest_stocks?.length || 0) : 0;

  const allSections = [];
  for (const p of posts) {
    for (const sec of (p.sections || [])) {
      allSections.push(sec);
    }
  }
  const merged = {};
  for (const sec of allSections) {
    if (!merged[sec.type]) merged[sec.type] = { type: sec.type, stocks: [] };
    merged[sec.type].stocks.push(...(sec.stocks || []));
  }
  const order = ['상승', '하락'];
  const sectionsHtml = order
    .filter(t => merged[t])
    .map(t => renderSection(merged[t]))
    .join('');

  const kiwoomHtml = renderKiwoomBlock(kiwoom, cafeStockNames);
  const statsParts = [];
  if (kiwoomCount > 0) statsParts.push(`거래대금 ${kiwoomCount}종목`);
  if (totalStocks > 0) statsParts.push(`카페 ${totalStocks}종목 · ${totalNews}뉴스`);
  const statsText = statsParts.join(' · ') || '데이터 없음';

  return `
    <div class="date-group">
      <div class="date-header">
        <div class="date-label">${escapeHtml(date)}</div>
        <div class="date-stats">${statsText}</div>
      </div>
      ${kiwoomHtml}
      ${sectionsHtml}
    </div>
  `;
}

async function init() {
  const meta = document.getElementById('meta');
  const content = document.getElementById('content');

  // 카페 + 키움 인덱스 + 테마 병행 로드
  const [cafeIndex, kiwoomIndex, themes] = await Promise.all([loadIndex(), loadKiwoomIndex(), loadThemes()]);
  themesData = themes;

  const cafeUpdated = cafeIndex?.updated_at || '—';
  const kiwoomUpdated = kiwoomIndex?.updated_at || '—';
  meta.textContent = '';

  // 카페 글 로드 (sample fallback 없음 — 실제 데이터만)
  const postIds = (cafeIndex?.posts || []).map(p => p.post_id);
  const posts = [];
  for (const id of postIds.slice(0, 30)) {
    const p = await loadPost(id);
    if (p) posts.push(p);
  }

  // 카페 글의 날짜 + 키움 인덱스 날짜 합집합
  const dateSet = new Set();
  for (const p of posts) dateSet.add(deriveDate(p));
  for (const d of (kiwoomIndex?.dates || [])) dateSet.add(d);

  if (dateSet.size === 0) {
    content.innerHTML = `
      <div class="empty">
        <strong>⏳ 아직 수집된 데이터가 없습니다.</strong><br>
        뉴지(카페)와 키움 스크레이퍼가 첫 실행에 성공하면 이 자리에 표시됩니다.<br>
        <small style="display:block; margin-top: 12px; opacity: 0.6;">
          실제 데이터가 들어오기 전까지 어떠한 가짜·샘플 데이터도 표시하지 않습니다.
        </small>
      </div>
    `;
    return;
  }

  // 키움 데이터를 날짜별로 fetch (병렬, sample fallback 없음)
  const kiwoomByDate = {};
  await Promise.all(Array.from(dateSet).map(async d => {
    kiwoomByDate[d] = await loadKiwoomDate(d);
  }));

  // 카페 글 날짜별 그룹
  const postsByDate = {};
  for (const p of posts) {
    const d = deriveDate(p);
    if (!postsByDate[d]) postsByDate[d] = [];
    postsByDate[d].push(p);
  }

  const sortedDates = Array.from(dateSet).sort().reverse();
  content.innerHTML = sortedDates
    .map(d => renderDateGroup(d, postsByDate[d] || [], kiwoomByDate[d]))
    .join('');
}

/* ───── 토스 캘린더 로직 ───── */
let calIndex = null;           // data/calendar/index.json (없으면 null)
let calViewYear, calViewMonth; // 현재 보기 연·월 (month: 1~12)
let calSelectedDate = null;    // 'YYYY-MM-DD'
const calDayCache = {};        // date → { kiwoom, cafePosts, narratives }

async function loadCalendarIndex() {
  try {
    const res = await fetch('/data/calendar/index.json?t=' + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

function pad2(n) { return String(n).padStart(2, '0'); }
function ymd(y, m, d) { return `${y}-${pad2(m)}-${pad2(d)}`; }
function formatKoDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dow = ['일','월','화','수','목','금','토'][new Date(y, m - 1, d).getDay()];
  return `${m}월 ${d}일 (${dow})`;
}
function isWeekendDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dow = new Date(y, m - 1, d).getDay();
  return dow === 0 || dow === 6;
}

function calActivityLevel(date) {
  // index가 없으면 모든 날 빈 상태
  if (!calIndex || !calIndex.days) return 0;
  const entry = calIndex.days[date];
  if (!entry) return 0;
  const score = entry.activity ?? entry.stock_count ?? 0;
  if (score >= 30) return 4;
  if (score >= 15) return 3;
  if (score >= 5) return 2;
  if (score >= 1) return 1;
  return 0;
}

function renderCalendar() {
  const grid = document.getElementById('toss-cal-grid');
  const ymEl = document.getElementById('toss-cal-ym');
  const subEl = document.getElementById('toss-cal-sub');
  const prevBtn = document.getElementById('toss-cal-prev');
  const nextBtn = document.getElementById('toss-cal-next');

  ymEl.textContent = `${calViewYear}년 ${calViewMonth}월`;

  const today = new Date();
  const todayY = today.getFullYear();
  const todayM = today.getMonth() + 1;
  const todayD = today.getDate();
  const todayStr = ymd(todayY, todayM, todayD);

  // 서브 텍스트 (해당 월 집계)
  let collectedDays = 0, totalStocks = 0;
  if (calIndex && calIndex.days) {
    for (const [d, e] of Object.entries(calIndex.days)) {
      if (d.startsWith(`${calViewYear}-${pad2(calViewMonth)}`)) {
        collectedDays++;
        totalStocks += (e.stock_count || 0);
      }
    }
  }
  subEl.textContent = `수집 ${collectedDays}일 · 종목 ${totalStocks}`;

  // 네비게이션 제한
  nextBtn.disabled = (calViewYear > todayY) || (calViewYear === todayY && calViewMonth >= todayM);

  // 그리드 렌더
  const firstDow = new Date(calViewYear, calViewMonth - 1, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const dows = ['일','월','화','수','목','금','토'];
  let html = '';
  dows.forEach((d, i) => {
    const cls = i === 0 ? 'sun' : (i === 6 ? 'sat' : '');
    html += `<div class="toss-cal-dow ${cls}">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="toss-cal-cell outside"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const date = ymd(calViewYear, calViewMonth, d);
    const isFuture = (calViewYear > todayY) ||
                     (calViewYear === todayY && calViewMonth > todayM) ||
                     (calViewYear === todayY && calViewMonth === todayM && d > todayD);
    const lv = isFuture ? 0 : calActivityLevel(date);
    const dow = new Date(calViewYear, calViewMonth - 1, d).getDay();
    const isWeekend = (dow === 0 || dow === 6);
    const isToday = (date === todayStr);
    const classes = ['toss-cal-cell'];
    if (isFuture) classes.push('future');
    else if (lv === 0) classes.push('empty');
    else classes.push('lv' + lv);
    if (isWeekend) classes.push('weekend');
    if (isToday) classes.push('today');
    if (date === calSelectedDate) classes.push('selected');
    const dotsHtml = lv > 0
      ? `<div class="toss-cal-dots">${'<div class="toss-cal-dot"></div>'.repeat(Math.min(lv,3))}</div>`
      : '';
    const aria = `${date} 활성도 ${lv}/4${isToday ? ' (오늘)' : ''}`;
    html += `<div class="${classes.join(' ')}" data-date="${date}" role="button" tabindex="${isFuture ? -1 : 0}" aria-label="${aria}">${d}${dotsHtml}</div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.toss-cal-cell[data-date]').forEach(el => {
    if (el.classList.contains('future')) return;
    el.addEventListener('click', () => onCalCellClick(el.dataset.date));
  });
}

async function onCalCellClick(date) {
  calSelectedDate = date;
  renderCalendar();
  const inner = document.getElementById('cal-content');
  inner.innerHTML = `
    <div class="cal-content-head">
      <div class="cal-content-date">${formatKoDate(date)}</div>
      <div class="cal-content-meta">불러오는 중…</div>
    </div>
    <div class="cal-empty"><div>데이터 로드 중</div></div>
  `;
  const data = await loadCalDayData(date);
  renderCalExpandContent(date, data);
}

async function loadCalDayData(date) {
  if (calDayCache[date]) return calDayCache[date];
  const [kiwoom, cafeIndex] = await Promise.all([
    loadKiwoomDate(date),
    loadIndex()
  ]);
  // 해당 날짜 카페 포스트 수집
  const postsOfDay = [];
  if (cafeIndex && cafeIndex.posts) {
    const idsOfDay = cafeIndex.posts
      .filter(p => {
        const d = p.post_date || (p.fetched_at || '').slice(0, 10);
        return d === date;
      })
      .map(p => p.post_id);
    for (const id of idsOfDay.slice(0, 10)) {
      const post = await loadPost(id);
      if (post) postsOfDay.push(post);
    }
  }
  // 내러티브 dedupe
  const narrSet = new Set();
  for (const p of postsOfDay) {
    for (const sec of (p.sections || [])) {
      for (const st of (sec.stocks || [])) {
        for (const nc of (st.news_cards || [])) {
          if (nc.summary) narrSet.add(nc.summary.trim());
        }
      }
    }
  }
  const result = {
    kiwoom,
    cafePosts: postsOfDay,
    narratives: Array.from(narrSet)
  };
  calDayCache[date] = result;
  return result;
}

function renderCalExpandContent(date, data) {
  const inner = document.getElementById('cal-content');
  const kiwoomStocks = data.kiwoom ? (data.kiwoom.daily_top || data.kiwoom.latest_stocks || []) : [];
  const hasAny = (data.narratives.length > 0) || kiwoomStocks.length > 0 || data.cafePosts.length > 0;

  if (!hasAny) {
    inner.innerHTML = `
      <div class="cal-content-head">
        <div class="cal-content-date">${formatKoDate(date)}</div>
        <div class="cal-content-meta">데이터 없음</div>
      </div>
      <div class="cal-empty">
        <div class="cal-empty-circle"></div>
        <div>${isWeekendDate(date) ? '주말 — 장 휴장' : '수집된 데이터가 없습니다'}</div>
      </div>
    `;
    return;
  }

  // 카페 특징주 수집 (종목명 → 뉴스카드 매핑 포함)
  const cafeStockMap = new Map(); // name → { stock, newsCards[] }
  for (const p of data.cafePosts) {
    for (const sec of (p.sections || [])) {
      for (const st of (sec.stocks || [])) {
        if (!st.name) continue;
        if (!cafeStockMap.has(st.name)) {
          cafeStockMap.set(st.name, { stock: st, newsCards: [] });
        }
        const entry = cafeStockMap.get(st.name);
        for (const nc of (st.news_cards || [])) entry.newsCards.push(nc);
      }
    }
  }

  // 특징주 결정: 카페 우선, 비면 거래대금 TOP fallback
  let featureSource = 'cafe';
  let featureItems = []; // { name, pct, themes, newsCards, ticker }
  if (cafeStockMap.size > 0) {
    for (const [name, e] of cafeStockMap.entries()) {
      const pct = e.stock.change_pct ?? null;
      const ticker = e.stock.ticker;
      const themes = (themesData?.stocks?.[ticker]?.themes || []).slice(0, 3);
      featureItems.push({ name, pct, themes, newsCards: e.newsCards, ticker });
    }
    featureItems = featureItems.slice(0, 12);
  } else if (kiwoomStocks.length > 0) {
    featureSource = 'fallback';
    featureItems = kiwoomStocks.slice(0, 6).map(s => {
      const pct = s.max_change_pct ?? s.change_pct ?? null;
      const themes = (themesData?.stocks?.[s.ticker]?.themes || []).slice(0, 3);
      return { name: s.name, pct, themes, newsCards: [], ticker: s.ticker };
    });
  }

  // 메타: 활성도 요약
  const newsTotal = featureItems.reduce((s, i) => s + i.newsCards.length, 0);
  const metaParts = [];
  if (kiwoomStocks.length > 0) metaParts.push(`거래대금 ${kiwoomStocks.length}종목`);
  if (featureItems.length > 0) metaParts.push(`특징주 ${featureItems.length}`);
  if (newsTotal > 0) metaParts.push(`뉴스 ${newsTotal}`);
  const metaText = metaParts.join(' · ') || '—';

  // ① 내러티브
  const narrHtml = data.narratives.length > 0 ? `
    <div class="cal-section">
      <div class="cal-section-title">오늘의 내러티브 <span class="count">${data.narratives.length}</span></div>
      <div class="cal-narr-stack">
        ${data.narratives.slice(0, 8).map(n => `<span class="cal-narr-pill">${escapeHtml(n)}</span>`).join('')}
      </div>
    </div>
  ` : '';

  // ② 거래대금 TOP
  const kiwoomHtml = kiwoomStocks.length > 0 ? `
    <div class="cal-section">
      <div class="cal-section-title">거래대금 TOP <span class="count">${Math.min(kiwoomStocks.length, 15)}</span></div>
      <div class="cal-trade-list">
        ${kiwoomStocks.slice(0, 15).map((s, i) => {
          const pct = s.max_change_pct ?? s.change_pct ?? 0;
          const dir = pct >= 0 ? 'up' : 'down';
          const sign = pct >= 0 ? '+' : '';
          const themes = (themesData?.stocks?.[s.ticker]?.themes || []).slice(0, 2);
          return `
            <div class="cal-trade-row">
              <div class="cal-trade-rank">#${i + 1}</div>
              <div class="cal-trade-name-cell">
                <span class="cal-trade-name">${escapeHtml(s.name)}</span>
                ${themes.map(t => `<span class="cal-ind-chip">${escapeHtml(t.name)}</span>`).join('')}
              </div>
              <div class="cal-trade-amount">${fmtTradeAmount(s.max_trade_amount ?? s.trade_amount)}</div>
              <div class="cal-trade-pct ${dir}">${sign}${pct.toFixed(2)}%</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : `
    <div class="cal-section">
      <div class="cal-section-title">거래대금 TOP</div>
      <div class="cal-empty" style="padding:24px 0;">${isWeekendDate(date) ? '주말/휴장' : '거래대금 데이터 없음'}</div>
    </div>
  `;

  // ③ 특징주 + 뉴스 (nested)
  const featureHtml = featureItems.length > 0 ? `
    <div class="cal-section">
      <div class="cal-section-title">
        특징주 <span class="count">${featureItems.length}</span>
        <span class="cal-feature-source ${featureSource}">${featureSource === 'cafe' ? '카페' : '거래대금 기반'}</span>
      </div>
      <div class="cal-feature-list">
        ${featureItems.map(it => {
          const pct = it.pct;
          const dir = (pct ?? 0) >= 0 ? 'up' : 'down';
          const sign = (pct ?? 0) >= 0 ? '+' : '';
          const pctText = pct != null ? `${sign}${pct.toFixed(2)}%` : '';
          const newsInner = it.newsCards.length > 0
            ? it.newsCards.slice(0, 6).map(renderNewsCard).join('')
            : `<div class="cal-feature-news-empty">뉴스 없음</div>`;
          return `
            <div class="cal-feature-card">
              <div class="cal-feature-head">
                <span class="cal-feature-name">${escapeHtml(it.name)}</span>
                ${pctText ? `<span class="cal-feature-pct ${dir}">${pctText}</span>` : ''}
                ${it.themes.map(t => `<span class="cal-ind-chip">${escapeHtml(t.name)}</span>`).join('')}
              </div>
              <div class="cal-feature-news">${newsInner}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  inner.innerHTML = `
    <div class="cal-content-head">
      <div class="cal-content-date">${formatKoDate(date)}</div>
      <div class="cal-content-meta">${metaText}</div>
    </div>
    ${narrHtml}
    ${kiwoomHtml}
    ${featureHtml}
  `;
}

async function initCalendar() {
  calIndex = await loadCalendarIndex(); // null이면 모든 날 빈 상태
  const now = new Date();
  calViewYear = now.getFullYear();
  calViewMonth = now.getMonth() + 1;
  const todayStr = ymd(now.getFullYear(), now.getMonth() + 1, now.getDate());
  calSelectedDate = todayStr;
  renderCalendar();
  // 오늘 자동 선택 → 콘텐츠 즉시 로드
  onCalCellClick(todayStr);

  document.getElementById('toss-cal-prev').addEventListener('click', () => {
    calViewMonth--;
    if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
    renderCalendar();
  });
  document.getElementById('toss-cal-next').addEventListener('click', () => {
    const now2 = new Date();
    if (calViewYear > now2.getFullYear() ||
        (calViewYear === now2.getFullYear() && calViewMonth >= now2.getMonth() + 1)) return;
    calViewMonth++;
    if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
    renderCalendar();
  });
}

initCalendar();
init();
</script>
